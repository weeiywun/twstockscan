name: AI Stock Ranking

on:
  # 暫停自動執行（AI 排名功能暫時停用）
  # push:
  #   paths:
  #     - 'data/chips_big_holder.json'
  workflow_dispatch:

concurrency:
  group: data-writes-main
  cancel-in-progress: false

jobs:
  rank:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run AI ranking
        run: python scripts/call_ai_ranking.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Commit AI recommendations
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ai_recommendations.json
          if ! git diff --staged --quiet; then
            git commit -m "data: AI ranking $(date +%Y-%m-%d)"
            for i in {1..4}; do
              echo "嘗試 push（第 $i 次）..."
              git pull --rebase --autostash origin main && git push && {
                echo "✅ Push 成功"
                break
              } || {
                if [ $i -lt 4 ]; then
                  sleep $((2 ** i))
                else
                  echo "❌ Push 失敗"
                  exit 1
                fi
              }
            done
          else
            echo "AI recommendations 無變動，略過提交"
          fi
