name: 突破策略選股（手動）

on:
  workflow_dispatch:

concurrency:
  group: data-writes-main
  cancel-in-progress: false

jobs:
  breakout-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: 更新價格快取（price_cache.parquet + stock_list_cache.json）
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_API_TOKEN }}
        run: python scripts/update_price_cache.py --allow-stale

      - name: Commit 價格快取
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/price_cache.parquet data/stock_list_cache.json
          if ! git diff --staged --quiet; then
            git commit -m "data: price cache update $(date -u +%Y-%m-%d) [breakout-manual]"
            for i in {1..4}; do
              git pull --rebase --autostash origin main && git push && break || sleep $((2 ** i))
            done
          else
            echo "價格快取無變動，略過提交"
          fi

      - name: 突破策略掃描
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_API_TOKEN }}
        run: python scripts/scan_right_top.py --allow-stale

      - name: 突破策略標的追蹤
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_API_TOKEN }}
        run: python scripts/track_right_top.py

      - name: Commit 突破策略結果
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/right_top.json data/right_top_track.json
          if ! git diff --staged --quiet; then
            git commit -m "data: breakout scan update $(date -u +%Y-%m-%d) [manual]"
            for i in {1..4}; do
              echo "嘗試 push（第 $i 次）..."
              git pull --rebase --autostash origin main && git push && {
                echo "Push 成功"
                break
              } || {
                if [ $i -lt 4 ]; then
                  sleep $((2 ** i))
                else
                  echo "Push 失敗"
                  exit 1
                fi
              }
            done
          else
            echo "突破策略結果無變動，略過提交"
          fi
