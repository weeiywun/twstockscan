name: 每日選股掃描

on:
  # 由 Google Apps Script 於台灣時間 17:00 觸發，避免 GitHub schedule 延遲或漏跑。
  # 17:00 通常已可取得盤後資料，供每日選股模型使用。
  repository_dispatch:
    types: [daily_scan_1700]
  workflow_dispatch:
    inputs:
      confirm:
        description: '手動執行請輸入 RUN_DAILY_SCAN，避免誤觸消耗資料請求'
        required: false
        default: ''
      backfill_month:
        description: '回填月份（格式：2025-10），留空為每日更新模式'
        required: false
        default: ''

concurrency:
  group: data-writes-main
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: ${{ github.event_name == 'repository_dispatch' || github.event.inputs.confirm == 'RUN_DAILY_SCAN' }}

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: 更新價格快取（price_cache.parquet + stock_list_cache.json）
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_API_TOKEN }}
        run: |
          if [ -n "${{ github.event.inputs.backfill_month }}" ]; then
            echo "回填模式：${{ github.event.inputs.backfill_month }}"
            python scripts/update_price_cache.py --backfill ${{ github.event.inputs.backfill_month }}
          else
            echo "每日更新模式"
            python scripts/update_price_cache.py
          fi

      - name: 更新大盤指數快取
        run: python scripts/update_market_index.py

      - name: 更新期權籌碼儀錶板
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_API_TOKEN }}
        run: python scripts/update_futures_dashboard.py

      - name: 更新融資餘額快取
        run: python scripts/update_margin_balance.py

      - name: Commit 價格快取
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/price_cache.parquet data/stock_list_cache.json data/market_index.json data/futures_dashboard.json data/margin_balance.json
          if ! git diff --staged --quiet; then
            git commit -m "data: price cache update $(date -u +%Y-%m-%d)"
            for i in {1..4}; do
              git pull --rebase --autostash origin main && git push && break || sleep $((2 ** i))
            done
          else
            echo "快取無變動，略過提交"
          fi

      - name: 突破策略掃描
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_API_TOKEN }}
        run: python scripts/scan_right_top.py

      - name: 突破策略標的追蹤
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_API_TOKEN }}
        run: python scripts/track_right_top.py

      - name: 量增訊號掃描
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_API_TOKEN }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_IDS: ${{ secrets.LINE_USER_IDS }}
        run: python scripts/scan_volume_signal.py

      - name: 量增回測模型
        run: python scripts/scan_volume_pullback.py

      - name: 動能回測模型
        run: python scripts/scan_momentum_pullback.py

      - name: 更新前端現價快照
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_API_TOKEN }}
        run: python scripts/update_current_prices.py

      - name: Generate LINE performance chart
        run: python scripts/generate_line_performance_chart.py

      - name: Update big holder trend prices
        run: python scripts/update_big_holder_trend_prices.py

      - name: 短線強勢雷達
        run: python scripts/scan_momentum_candidates.py

      - name: Track trend candidates
        run: python scripts/track_trend_candidates.py

      - name: Enrich candidate features
        run: python scripts/enrich_candidate_features.py

      - name: Apply unified stock scoring
        run: python scripts/apply_unified_scores.py

      - name: Commit 掃描結果
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/right_top.json data/right_top_track.json data/volume_signal.json data/volume_pullback.json data/momentum_pullback.json data/momentum_candidates.json data/trend_follow.json data/candidate_features.json data/performance.json data/chips_big_holder.json data/big_holder_trend.json data/current_prices.json data/ai_analysis.json assets/line/performance-latest.png
          if ! git diff --staged --quiet; then
            git commit -m "data: daily scan update $(date -u +%Y-%m-%d)"
            for i in {1..4}; do
              echo "嘗試 push（第 $i 次）..."
              git pull --rebase --autostash origin main && git push && {
                echo "✅ Push 成功"
                break
              } || {
                if [ $i -lt 4 ]; then
                  sleep $((2 ** i))
                else
                  echo "❌ Push 失敗"
                  exit 1
                fi
              }
            done
          else
            echo "掃描結果無變動，略過提交"
          fi

      - name: Notify LINE on success
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_IDS: ${{ secrets.LINE_USER_IDS }}
        run: python scripts/send_daily_scan_summary.py

      - name: Notify LINE on failure
        if: failure()
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_IDS: ${{ secrets.LINE_USER_IDS }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          USER_IDS_JSON=$(echo "$LINE_USER_IDS" | tr ',' '\n' | jq -R . | jq -s .)
          curl -s -X POST https://api.line.me/v2/bot/message/multicast \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $LINE_CHANNEL_ACCESS_TOKEN" \
            -d "{
              \"userIds\": $USER_IDS_JSON,
              \"messages\": [{\"type\": \"text\", \"text\": \"⚠️ 每日選股掃描 workflow 執行失敗\\n\\n日期：$(date -u +%Y-%m-%d)\\n\\n請至 GitHub Actions 查看錯誤日誌：\\n$RUN_URL\"}]
            }"
