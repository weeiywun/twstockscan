name: 大戶持股分析

on:
  repository_dispatch:
    types: [holdings_scan_weekly]
  workflow_dispatch:
    inputs:
      confirm:
        description: '手動執行請輸入 RUN_HOLDINGS_SCAN，避免誤觸消耗資料請求'
        required: false
        default: ''

concurrency:
  group: data-writes-main
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: ${{ github.event_name == 'repository_dispatch' || (github.event_name == 'workflow_dispatch' && github.event.inputs.confirm == 'RUN_HOLDINGS_SCAN') }}

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch TDCC holdings data
        run: python scripts/fetch_tdcc_holdings.py

      - name: Commit updated CSV
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/big1000.csv data/big400.csv
          if ! git diff --staged --quiet; then
            git commit -m "data: TDCC holdings CSV update $(date -u +%Y-%m-%d)"
          else
            echo "CSV 無變動，略過提交"
          fi

      - name: Run holdings analysis
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_API_TOKEN }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_IDS: ${{ secrets.LINE_USER_IDS }}
        run: python scripts/fetch_holdings_twsthr.py

      - name: Run big holder trend scan
        run: python scripts/scan_big_holder_trend.py

      - name: Track big holder trend pool
        run: python scripts/track_big_holder_trend.py

      - name: Commit and push results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/chips_big_holder.json data/big_holder_trend.json data/big_holder_trend_track.json

          if ! git diff --staged --quiet; then
            git commit -m "data: chips_big_holder update $(date -u +%Y-%m-%d)"

            for i in {1..4}; do
              echo "嘗試 push（第 $i 次）..."
              git pull --rebase --autostash origin main && git push && {
                echo "✅ Push 成功"
                break
              } || {
                if [ $i -lt 4 ]; then
                  sleep $((2 ** i))
                else
                  echo "❌ Push 失敗"
                  exit 1
                fi
              }
            done
          else
            echo "資料無變動，略過提交"
          fi

      - name: Refresh dependent scans from latest trading day
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_API_TOKEN }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_IDS: ${{ secrets.LINE_USER_IDS }}
          SCAN_DATE: latest_cache
        run: python scripts/scan_volume_signal.py

      - name: Refresh volume pullback model
        run: python scripts/scan_volume_pullback.py

      - name: Refresh frontend current prices
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_API_TOKEN }}
        run: python scripts/update_current_prices.py

      - name: Generate LINE performance chart
        run: python scripts/generate_line_performance_chart.py

      - name: Refresh momentum candidates
        run: python scripts/scan_momentum_candidates.py

      - name: Enrich candidate features
        run: python scripts/enrich_candidate_features.py

      - name: Apply unified stock scoring
        run: python scripts/apply_unified_scores.py

      - name: Commit dependent scan results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/volume_signal.json data/volume_pullback.json data/momentum_candidates.json data/candidate_features.json data/performance.json data/chips_big_holder.json data/big_holder_trend.json data/current_prices.json data/ai_analysis.json data/right_top.json data/right_top_track.json assets/line/performance-latest.png

          if ! git diff --staged --quiet; then
            git commit -m "data: post-holdings scan refresh $(date -u +%Y-%m-%d)"

            for i in {1..4}; do
              echo "Post-holdings push attempt $i..."
              git pull --rebase --autostash origin main && git push && {
                echo "Push success"
                break
              } || {
                if [ $i -lt 4 ]; then
                  sleep $((2 ** i))
                else
                  echo "Push failed"
                  exit 1
                fi
              }
            done
          else
            echo "No dependent scan changes"
          fi

      - name: Notify LINE on failure
        if: failure()
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_IDS: ${{ secrets.LINE_USER_IDS }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          USER_IDS_JSON=$(echo "$LINE_USER_IDS" | tr ',' '\n' | jq -R . | jq -s .)
          curl -s -X POST https://api.line.me/v2/bot/message/multicast \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $LINE_CHANNEL_ACCESS_TOKEN" \
            -d "{
              \"userIds\": $USER_IDS_JSON,
              \"messages\": [{\"type\": \"text\", \"text\": \"⚠️ 大戶持股分析 workflow 執行失敗\\n\\n日期：$(date -u +%Y-%m-%d)\\n\\n請至 GitHub Actions 查看錯誤日誌：\\n$RUN_URL\"}]
            }"
