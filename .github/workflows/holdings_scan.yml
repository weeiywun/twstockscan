name: PHASE3 大戶持股分析 (Holdings Scanner)

on:
  # 每週六台灣時間 18:00（UTC 10:00）執行
  # 請先手動更新 data/big1000.csv 與 data/big400.csv，再等此排程自動跑分析
  schedule:
    - cron: '0 10 * * 6'
  # 允許手動觸發（上傳 CSV 後可立即執行）
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run holdings analysis
        run: python scripts/fetch_holdings_twsthr.py

      - name: Commit and push results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/chips_big_holder.json

          if ! git diff --staged --quiet; then
            git commit -m "data: chips_big_holder update $(date -u +%Y-%m-%d)"

            for i in {1..4}; do
              echo "嘗試 push（第 $i 次）..."
              git pull --rebase --autostash origin main && git push && {
                echo "✅ Push 成功"
                break
              } || {
                if [ $i -lt 4 ]; then
                  sleep $((2 ** i))
                else
                  echo "❌ Push 失敗"
                  exit 1
                fi
              }
            done
          else
            echo "資料無變動，略過提交"
          fi

      - name: Notify LINE on failure
        if: failure()
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_IDS: ${{ secrets.LINE_USER_IDS }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          USER_IDS_JSON=$(echo "$LINE_USER_IDS" | tr ',' '\n' | jq -R . | jq -s .)
          curl -s -X POST https://api.line.me/v2/bot/message/multicast \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $LINE_CHANNEL_ACCESS_TOKEN" \
            -d "{
              \"userIds\": $USER_IDS_JSON,
              \"messages\": [{\"type\": \"text\", \"text\": \"⚠️ 大戶持股分析 workflow 執行失敗\\n\\n日期：$(date -u +%Y-%m-%d)\\n\\n請至 GitHub Actions 查看錯誤日誌：\\n$RUN_URL\"}]
            }"
