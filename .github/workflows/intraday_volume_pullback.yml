name: 10:00 盤中量增回測預警

on:
  workflow_dispatch:
  repository_dispatch:
    types: [intraday_volume_pullback_1000]

concurrency:
  group: data-writes-main
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: 10:00 盤中量增回測掃描
        run: python scripts/scan_intraday_volume_pullback.py

      - name: Commit 盤中預警結果
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/intraday_volume_pullback.json
          if ! git diff --staged --quiet; then
            git commit -m "data: intraday volume pullback update $(date -u +%Y-%m-%d)"
            for i in {1..4}; do
              echo "嘗試 push（第 $i 次）..."
              git pull --rebase --autostash origin main && git push && {
                echo "Push 成功"
                break
              } || {
                if [ $i -lt 4 ]; then
                  sleep $((2 ** i))
                else
                  echo "Push 失敗"
                  exit 1
                fi
              }
            done
          else
            echo "No intraday volume pullback changes"
          fi
