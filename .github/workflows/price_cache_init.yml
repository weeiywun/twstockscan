name: 價格快取初始化（一次性）

on:
  workflow_dispatch:

concurrency:
  group: data-writes-main
  cancel-in-progress: false

jobs:
  init:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: 初始化價格快取（yfinance）
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_API_TOKEN }}
        run: python scripts/update_price_cache.py --init

      - name: Commit 快取與股票清單
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/price_cache.parquet data/stock_list_cache.json
          if ! git diff --staged --quiet; then
            git commit -m "data: price cache init $(date -u +%Y-%m-%d)"
            for i in {1..4}; do
              git pull --rebase --autostash origin main && git push && {
                echo "✅ Push 成功"
                break
              } || sleep $((2 ** i))
            done
          else
            echo "無變動，略過提交"
          fi

      - name: Notify LINE on failure
        if: failure()
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_IDS: ${{ secrets.LINE_USER_IDS }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          USER_IDS_JSON=$(echo "$LINE_USER_IDS" | tr ',' '\n' | jq -R . | jq -s .)
          curl -s -X POST https://api.line.me/v2/bot/message/multicast \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $LINE_CHANNEL_ACCESS_TOKEN" \
            -d "{
              \"userIds\": $USER_IDS_JSON,
              \"messages\": [{\"type\": \"text\", \"text\": \"⚠️ 價格快取初始化失敗\\n\\n請至 GitHub Actions 查看錯誤日誌：\\n$RUN_URL\"}]
            }"
