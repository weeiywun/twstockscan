name: 價格快取初始化（一次性）

on:
  workflow_dispatch:

jobs:
  init:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: 計算需回填的月份清單
        run: |
          python3 -c "
          from datetime import datetime, timedelta
          today = datetime.today()
          months = sorted(set(
              (today - timedelta(days=i)).strftime('%Y-%m')
              for i in range(210)
          ))
          print('需回填月份：', months)
          with open('/tmp/backfill_months.txt', 'w') as f:
              f.write('\n'.join(months))
          "
          echo "月份清單："
          cat /tmp/backfill_months.txt

      - name: 逐月回填價格快取
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_API_TOKEN }}
        run: |
          while IFS= read -r month; do
            echo ""
            echo "==============================="
            echo "  回填：$month"
            echo "==============================="
            python scripts/update_price_cache.py --backfill "$month"
          done < /tmp/backfill_months.txt

      - name: Commit 快取與股票清單
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/price_cache.parquet data/stock_list_cache.json
          if ! git diff --staged --quiet; then
            git commit -m "data: price cache init $(date -u +%Y-%m-%d)"
            for i in {1..4}; do
              git pull --rebase --autostash origin main && git push && {
                echo "✅ Push 成功"
                break
              } || sleep $((2 ** i))
            done
          else
            echo "無變動，略過提交"
          fi

      - name: Notify LINE on failure
        if: failure()
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_IDS: ${{ secrets.LINE_USER_IDS }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          USER_IDS_JSON=$(echo "$LINE_USER_IDS" | tr ',' '\n' | jq -R . | jq -s .)
          curl -s -X POST https://api.line.me/v2/bot/message/multicast \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $LINE_CHANNEL_ACCESS_TOKEN" \
            -d "{
              \"userIds\": $USER_IDS_JSON,
              \"messages\": [{\"type\": \"text\", \"text\": \"⚠️ 價格快取初始化失敗\\n\\n請至 GitHub Actions 查看錯誤日誌：\\n$RUN_URL\"}]
            }"
