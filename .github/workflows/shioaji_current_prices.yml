name: Shioaji current prices

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type UPDATE_SHIOAJI_PRICES to update data/current_prices.json'
        required: true
        default: ''

concurrency:
  group: shioaji-current-prices
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: ${{ github.event.inputs.confirm == 'UPDATE_SHIOAJI_PRICES' }}

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Update current prices from Shioaji
        env:
          SHIOAJI_API_KEY: ${{ secrets.SHIOAJI_API_KEY }}
          SHIOAJI_SECRET_KEY: ${{ secrets.SHIOAJI_SECRET_KEY }}
        run: python scripts/shioaji_update_current_prices.py

      - name: Commit current prices
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/current_prices.json
          if ! git diff --staged --quiet; then
            git commit -m "data: shioaji current prices update $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            for i in {1..4}; do
              git pull --rebase --autostash origin main && git push && break || sleep $((2 ** i))
            done
          else
            echo "No current price changes"
          fi
