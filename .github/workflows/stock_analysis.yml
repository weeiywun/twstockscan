name: 標的分析 (AI 評分)

on:
  # 量增訊號掃完後自動觸發
  workflow_run:
    workflows: ["量增訊號掃描 (Layer 2)"]
    types: [completed]
  # 手動觸發
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # 只在量增訊號成功時執行（手動觸發時略過此判斷）
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run stock analysis
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FINMIND_TOKEN:  ${{ secrets.FINMIND_API_TOKEN }}
        run: python scripts/stock_analysis.py

      - name: Commit and push results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin main
          git reset --soft origin/main
          git add data/ai_analysis.json

          if ! git diff --staged --quiet; then
            git commit -m "data: ai_analysis update $(date -u +%Y-%m-%d)"
            git push origin HEAD:main
          else
            echo "ai_analysis.json 無變動，略過提交"
          fi
