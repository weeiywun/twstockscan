name: 更新現價（手動觸發）

on:
  # 台灣時間週二至週六 06:00 自動更新，對接美股收盤與台指夜盤結果。
  schedule:
    - cron: '0 22 * * 1-5'
  workflow_dispatch:
    inputs:
      request_id:
        description: 'Client request id for run polling'
        required: false
        type: string

concurrency:
  group: data-writes-main
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: 更新現價
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_API_TOKEN }}
        run: python scripts/update_current_prices.py

      - name: 更新大盤指數
        run: python scripts/update_market_index.py

      - name: 更新期權籌碼儀錶板
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_API_TOKEN }}
        run: python scripts/update_futures_dashboard.py

      - name: Commit & Push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/current_prices.json data/performance.json data/market_index.json data/futures_dashboard.json
          if ! git diff --staged --quiet; then
            git commit -m "data: market snapshot update $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            for i in {1..4}; do
              git pull --rebase --autostash origin main && git push && break || sleep $((2 ** i))
            done
          else
            echo "現價無變動，略過提交"
          fi
