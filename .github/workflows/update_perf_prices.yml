name: 更新持倉現價

on:
  # 台灣時間 14:00（UTC 06:00），週一到週五
  schedule:
    - cron: '0 6 * * 1-5'
  workflow_dispatch:

jobs:
  update-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Update performance prices
        run: python scripts/update_perf_prices.py

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/performance.json data/chips_big_holder.json data/right_top.json

          if ! git diff --staged --quiet; then
            git commit -m "data: perf price update $(date -u +%Y-%m-%d)"

            for i in {1..3}; do
              git pull --rebase --autostash origin main && git push && {
                echo "✅ Push 成功"
                break
              } || {
                if [ $i -lt 3 ]; then
                  sleep $((2 ** i))
                else
                  echo "❌ Push 失敗"
                  exit 1
                fi
              }
            done
          else
            echo "價格無變動，略過提交"
          fi
