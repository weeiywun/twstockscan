name: 爆量追蹤選股 (Volume Breakout Scanner)

on:
  # 每個交易日 15:30 台灣時間執行（UTC 07:30）
  schedule:
    - cron: '30 7 * * 1-5'
  # 允許手動觸發（首次測試用）
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run volume breakout scanner
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: python scripts/scan_volume_breakout.py

      - name: Commit and push results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/volume_breakout.json
          # 若資料無變動則不提交（避免空提交）
          git diff --staged --quiet && echo "資料無變動，略過提交" || \
            git commit -m "data: volume_breakout update $(date -u +%Y-%m-%d)"
          git push
