name: 爆量追蹤選股 (Volume Breakout Scanner)

on:
  # 每個交易日 15:30 台灣時間執行（UTC 07:30）（作為備用）
  schedule:
    - cron: '30 7 * * 1-5'
  # 允許外部 API 觸發（例如 Google Apps Script）
  repository_dispatch:
    types: [volume-breakout-trigger]
  # 允許手動觸發（首次測試用）
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run volume breakout scanner
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: python scripts/scan_volume_breakout.py

      - name: Commit and push results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/volume_breakout.json
          git add data/history/

          # 若資料無變動則不提交（避免空提交）
          if ! git diff --staged --quiet; then
            git commit -m "data: volume_breakout update $(date -u +%Y-%m-%d)"

            # 最多重試 3 次 push
            for i in {1..3}; do
              echo "嘗試 push（第 $i 次）..."
              git pull --rebase --autostash origin main && git push && {
                echo "✅ Push 成功"
                break
              } || {
                if [ $i -lt 3 ]; then
                  echo "⚠️ Push 失敗，等待 ${i} 秒後重試..."
                  sleep $i
                else
                  echo "❌ Push 失敗，已達最大重試次數"
                  exit 1
                fi
              }
            done
          else
            echo "資料無變動，略過提交"
          fi

      - name: Notify LINE on failure
        if: failure()
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl -s -X POST https://api.line.me/v2/bot/message/push \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $LINE_CHANNEL_ACCESS_TOKEN" \
            -d '{
              "to": "'"$LINE_USER_ID"'",
              "messages": [{"type": "text", "text": "⚠️ 爆量追蹤選股 workflow 執行失敗\n\n日期：'"$(date -u +%Y-%m-%d)"'\n\n請至 GitHub Actions 查看錯誤日誌：\n'"$RUN_URL"'"}]
            }'
