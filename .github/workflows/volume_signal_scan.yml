name: 量增訊號掃描 (Layer 2)

on:
  schedule:
    - cron: '10 8 * * 1-5'
  repository_dispatch:
    types: [volume-signal-trigger]
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run volume signal scan
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: python scripts/scan_volume_signal.py

      - name: Commit and push results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/volume_signal.json data/performance.json

          if ! git diff --staged --quiet; then
            git commit -m "data: volume_signal & performance update $(date -u +%Y-%m-%d)"

            for i in {1..4}; do
              git pull --rebase --autostash origin main && git push && break || {
                if [ $i -lt 4 ]; then sleep $((2 ** i)); else exit 1; fi
              }
            done
          else
            echo "資料無變動，略過提交"
          fi