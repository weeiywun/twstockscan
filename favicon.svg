<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- 海龜 favicon - 簡約設計 -->
  <defs>
    <style>
      .turtle-shell { fill: #0c6b3e; }
      .turtle-body { fill: #16a766; }
      .turtle-pattern { fill: #0a5a32; }
    </style>
  </defs>
  
  <!-- 龜殼主體 -->
  <ellipse class="turtle-shell" cx="50" cy="50" rx="35" ry="30"/>
  
  <!-- 龜殼紋路 -->
  <circle class="turtle-pattern" cx="50" cy="35" r="6"/>
  <circle class="turtle-pattern" cx="40" cy="50" r="5"/>
  <circle class="turtle-pattern" cx="60" cy="50" r="5"/>
  <circle class="turtle-pattern" cx="45" cy="60" r="4"/>
  <circle class="turtle-pattern" cx="55" cy="60" r="4"/>
  
  <!-- 頭部 -->
  <ellipse class="turtle-body" cx="50" cy="20" rx="8" ry="10"/>
  
  <!-- 四肢 -->
  <ellipse class="turtle-body" cx="25" cy="45" rx="8" ry="5"/>
  <ellipse class="turtle-body" cx="75" cy="45" rx="8" ry="5"/>
  <ellipse class="turtle-body" cx="30" cy="70" rx="6" ry="5"/>
  <ellipse class="turtle-body" cx="70" cy="70" rx="6" ry="5"/>
  
  <!-- 尾巴 -->
  <ellipse class="turtle-body" cx="50" cy="82" rx="4" ry="6"/>
  
  <!-- 眼睛 -->
  <circle fill="#1a1d2e" cx="47" cy="18" r="1.5"/>
  <circle fill="#1a1d2e" cx="53" cy="18" r="1.5"/>
</svg>
