<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SR_PC</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
/* ── Variables (Dark Theme) ──────────────────── */
:root {
  --bg:        #0d1117;
  --bg2:       #161b22;
  --bg3:       #1c2128;
  --border:    rgba(255,255,255,0.08);
  --border2:   rgba(255,255,255,0.15);
  --text:      #e6edf3;
  --text2:     #8b949e;
  --text3:     #6e7681;
  --green:     #3fb950;
  --green-dim: rgba(63,185,80,0.1);
  --green-glow:rgba(63,185,80,0.2);
  --amber:     #f0883e;
  --red:       #f85149;
  --blue:      #58a6ff;
  --mono:      'IBM Plex Mono', monospace;
  --sans:      'Noto Sans TC', sans-serif;
  --shadow-sm: 0 1px 4px rgba(0,0,0,0.4);
  --shadow:    0 2px 10px rgba(0,0,0,0.5);
  --radius:    10px;
}

/* ── Reset ─────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  background:var(--bg);color:var(--text);
  font-family:var(--sans);font-size:14px;line-height:1.6;
  min-height:100vh;overflow-x:hidden;
}

/* ── Shared inner constraint (aligns with .page-layout) ── */
.page-inner{
  max-width:1200px;margin:0 auto;padding:0 24px;width:100%;
}

/* ── Header ─────────────────────────────────── */
header{
  position:sticky;top:0;z-index:100;
  background:var(--bg2);
  border-bottom:1px solid var(--border);
  box-shadow:var(--shadow-sm);
  height:54px;
}
header .page-inner{
  display:flex;align-items:center;gap:20px;height:100%;
}
.logo{
  font-size:16px;font-weight:700;
  color:var(--text);letter-spacing:-.01em;white-space:nowrap;
  display:flex;align-items:center;gap:8px;
  font-family:var(--sans);
}
.logo-mark{
  display:inline-block;width:8px;height:8px;
  background:var(--green);border-radius:2px;
  flex-shrink:0;
}
.logo span{color:var(--green)}
.version-badge{
  font-size:10px;font-weight:600;font-family:var(--mono);
  color:var(--green);background:var(--green-dim);
  border:1px solid var(--green-glow);
  border-radius:4px;padding:2px 6px;letter-spacing:.02em;
  margin-left:4px;
}

.header-meta{
  margin-left:auto;font-size:12px;color:var(--text3);
  white-space:nowrap;
}

/* ── Strategy Nav ───────────────────────────── */
.strategy-nav{
  background:var(--bg2);border-bottom:1px solid var(--border);
}
.strategy-nav .page-inner{
  display:flex;gap:0;
  overflow-x:auto;scrollbar-width:none;
}
.strategy-nav .page-inner::-webkit-scrollbar{display:none}

.strat-tab{
  position:relative;
  padding:12px 18px 13px;
  font-size:13px;font-weight:500;
  color:var(--text2);
  border:none;background:none;cursor:pointer;
  transition:color .15s;white-space:nowrap;
  font-family:var(--sans);
  border-bottom:2px solid transparent;
  margin-bottom:-1px;
}
.strat-tab:hover{color:var(--text)}
.strat-tab.active{color:var(--green);border-bottom-color:var(--green)}
.strat-tab .badge{
  display:inline-flex;align-items:center;justify-content:center;
  min-width:18px;height:18px;padding:0 4px;border-radius:4px;
  background:var(--green-dim);color:var(--green);
  font-size:10px;font-weight:600;margin-left:6px;
}
.strat-tab.locked .badge{background:rgba(255,255,255,0.05);color:var(--text3)}
.strat-tab.locked{opacity:.5;cursor:not-allowed}

/* ── Tag badges ──────────────────────────────── */
.tag-badge{
  display:inline-block;padding:1px 6px;border-radius:10px;
  font-size:10px;font-weight:600;color:#fff;margin:1px 2px 1px 0;
  white-space:nowrap;
}
.tag-cell{display:flex;flex-wrap:wrap;gap:2px;min-width:0}

/* ── View mode toggle ────────────────────────── */
.view-btn{
  padding:4px 12px;border-radius:6px;font-size:12px;cursor:pointer;
  border:1px solid var(--border);background:var(--bg3);color:var(--text2);
  font-family:var(--sans);transition:all .15s;
}
.view-btn.active{background:var(--green);border-color:var(--green);color:#0d1117;}
.view-btn:hover:not(.active){background:var(--bg2);}

/* ── Industry group header row ───────────────── */
tr.industry-header-row td{
  background:var(--bg2);padding:8px 12px;border-top:2px solid var(--border2);
}
.industry-name{font-weight:700;font-size:13px;color:var(--text);margin-right:10px;}
.industry-avg{font-size:12px;color:var(--green);font-weight:600;margin-right:8px;}
.industry-count{font-size:11px;color:var(--text3);}

/* ── Amber text ──────────────────────────────── */
.amber-text{color:var(--amber);font-weight:600;}

/* ── Main layout ─────────────────────────────── */
main{padding:24px 0 0;}

/* ── Strategy Panel ─────────────────────────── */
.strategy-panel{display:none;animation:fadeIn .2s ease}
.strategy-panel.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

/* ── Strategy header ─────────────────────────── */
.strat-header{margin-bottom:20px}
.strat-title{font-size:18px;font-weight:700;letter-spacing:-.02em;margin-bottom:5px}
.strat-desc{font-size:13px;color:var(--text2);max-width:640px;line-height:1.7}

/* ── Conditions bar ─────────────────────────── */
.conditions{display:flex;flex-wrap:wrap;gap:6px;margin:14px 0 24px}
.cond{
  display:flex;align-items:center;gap:5px;
  padding:4px 10px;border-radius:20px;
  background:var(--bg3);border:1px solid var(--border);
  font-size:12px;color:var(--text2);
  box-shadow:var(--shadow-sm);
}
.cond-dot{width:5px;height:5px;border-radius:50%;background:var(--green);flex-shrink:0}

/* ── Summary row ─────────────────────────────── */
.summary-row{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;
  margin-bottom:24px;
}
.summary-card{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--radius);padding:14px 16px;
  box-shadow:var(--shadow-sm);
}
.summary-label{font-size:11px;color:var(--text3);letter-spacing:.04em;margin-bottom:4px}
.summary-value{font-family:var(--mono);font-size:20px;font-weight:600;color:var(--text)}
.summary-value.green{color:var(--green)}
.summary-value.amber{color:var(--amber)}
.summary-sub{font-size:11px;color:var(--text3);margin-top:2px}

/* ── Results table ──────────────────────────── */
.table-wrap{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--radius);overflow:hidden;margin-bottom:24px;
  box-shadow:var(--shadow-sm);
}
.table-toolbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;border-bottom:1px solid var(--border);
}
.table-title{font-size:12px;font-weight:600;color:var(--text2);letter-spacing:.04em}
.updated-tag{font-size:11px;color:var(--text3)}
.toolbar-right{display:flex;align-items:center;gap:10px}
.btn-csv{
  font-size:11px;font-weight:500;color:var(--text2);
  background:var(--bg3);border:1px solid var(--border);
  border-radius:6px;padding:4px 10px;cursor:pointer;
  display:flex;align-items:center;gap:5px;
  transition:background .15s,border-color .15s;
}
.btn-csv:hover{background:rgba(88,166,255,0.1);border-color:var(--blue);color:var(--blue)}

.table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;min-width:560px}
thead th{
  padding:9px 14px;text-align:left;
  font-size:11px;font-weight:600;color:var(--text3);
  letter-spacing:.04em;
  border-bottom:1px solid var(--border);background:var(--bg3);
  cursor:pointer;user-select:none;white-space:nowrap;
  position:sticky;top:0;z-index:20;
}
thead th:hover{color:var(--text2)}
thead th .sort-icon{opacity:.3;margin-left:4px;font-size:10px}
thead th.sorted .sort-icon{opacity:1;color:var(--green)}

tbody tr{
  border-bottom:1px solid var(--border);
  transition:background .12s;cursor:pointer;
}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:rgba(255,255,255,0.03)}
tbody tr.expanded{background:var(--green-dim)}

td{padding:12px 14px;vertical-align:middle}

.stock-code{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--green)}
.stock-name{font-size:13px;font-weight:500;margin-bottom:1px;color:var(--text)}
.stock-industry{font-size:11px;color:var(--text3)}

.price-cell{font-family:var(--mono);font-size:14px;font-weight:500;color:var(--text)}
.ema-cell{font-family:var(--mono);font-size:12px;color:var(--text3)}

.deviation{
  display:inline-flex;align-items:center;gap:3px;
  font-family:var(--mono);font-size:11px;font-weight:600;
  padding:2px 7px;border-radius:4px;
}
.deviation.neg{color:var(--blue);background:rgba(26,95,168,0.08)}
.deviation.pos{color:var(--amber);background:rgba(168,98,0,0.08)}

.big-pct{font-family:var(--mono);font-size:14px;font-weight:600;color:var(--text)}
.big-chg{
  font-family:var(--mono);font-size:11px;color:var(--green);
  background:var(--green-dim);padding:2px 5px;border-radius:3px;margin-left:5px;
}

/* ── Mini sparkline ─────────────────────────── */
.spark{display:inline-flex;align-items:flex-end;gap:2px;height:22px;vertical-align:middle}
.spark-bar{width:6px;background:var(--green);border-radius:1px 1px 0 0;opacity:.5;transition:opacity .15s}
tbody tr:hover .spark-bar{opacity:.9}

/* ── Expand row ─────────────────────────────── */
.expand-row td{padding:0}
.expand-flat{
  display:flex;align-items:flex-start;gap:16px;
  padding:14px 16px 14px 20px;
  background:var(--bg3);border-top:1px solid var(--border);
}
.expand-trend-wrap{flex:1;min-width:0;overflow-x:auto;-webkit-overflow-scrolling:touch}
.expand-table{
  border-collapse:collapse;font-size:12px;width:100%;min-width:360px;
}
.expand-table th{
  font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.04em;
  padding:4px 10px;text-align:center;border-bottom:1px solid var(--border);
  white-space:nowrap;background:var(--bg3);
}
.expand-table th:first-child{text-align:left}
.expand-table td{
  font-family:var(--mono);font-size:12px;color:var(--text2);
  padding:6px 10px;text-align:center;border-bottom:1px solid var(--border);
  white-space:nowrap;
}
.expand-table td:first-child{color:var(--text);font-weight:600;text-align:left;font-family:var(--sans)}
.expand-table td.expand-cum{font-weight:700}
.expand-table td.expand-cum.pos{color:var(--green)}
.expand-table td.expand-cum.neg{color:var(--red)}
.expand-table tbody tr:last-child td{border-bottom:none}
.expand-actions{flex:0 0 auto;display:flex;flex-direction:column;gap:6px;min-width:120px}

/* ── Page layout (content + sidebar) ────────── */
.page-layout{
  max-width:1200px;margin:0 auto;padding:0 24px 64px;
  display:grid;grid-template-columns:1fr 220px;gap:20px;
  align-items:start;
}
.watchlist-sidebar{
  position:sticky;top:112px;
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--radius);overflow:hidden;
  box-shadow:var(--shadow-sm);
}
.sidebar-header{
  padding:10px 14px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  background:var(--bg3);
}
.section-title{font-size:11px;font-weight:600;color:var(--text2);letter-spacing:.04em}
.watch-list{display:flex;flex-direction:column}
.watch-card{
  padding:9px 12px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:8px;
  font-size:12px;transition:background .12s;
}
.watch-card:last-child{border-bottom:none}
.watch-card:hover{background:var(--bg3)}
.watch-card-code{font-family:var(--mono);color:var(--green);font-weight:700;flex:0 0 auto}
.watch-card-name{color:var(--text2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.watch-card-remove{color:var(--text3);cursor:pointer;flex:0 0 auto;line-height:1;font-size:15px}
.watch-card-remove:hover{color:var(--red)}
.watch-empty{padding:20px 14px;color:var(--text3);font-size:12px;text-align:center;line-height:1.7}


/* ── Coming Soon panel ───────────────────────── */
.coming-soon{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:72px 20px;text-align:center;gap:10px;
}
.coming-icon{font-size:36px;opacity:.25}
.coming-title{font-size:15px;font-weight:600;color:var(--text2)}
.coming-desc{font-size:13px;color:var(--text3);max-width:360px;line-height:1.8}

/* ── Tooltip ─────────────────────────────────── */
[data-tip]{position:relative}
[data-tip]::after{
  content:attr(data-tip);
  position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);
  background:var(--text);border:1px solid var(--border2);
  color:#fff;font-size:11px;padding:4px 8px;border-radius:4px;
  white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .15s;
  font-family:var(--sans);font-weight:400;z-index:50;
}
[data-tip]:hover::after{opacity:1}

/* ── 垂直捲軸（超過10筆啟用）──────────────────── */
.table-scroll.table-vscroll{
  max-height:580px;
  overflow-y:auto;
}
.table-scroll{
  scrollbar-width:thin;
  scrollbar-color:var(--border2) transparent;
}
.table-scroll::-webkit-scrollbar{width:4px;height:4px}
.table-scroll::-webkit-scrollbar-track{background:transparent}
.table-scroll::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* ── AI 推薦卡片 ─────────────────────────────── */
.ai-card{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--radius);overflow:hidden;margin-bottom:24px;
  box-shadow:var(--shadow-sm);
}
.ai-card-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;border-bottom:1px solid var(--border);
  background:linear-gradient(90deg,var(--green-dim) 0%,transparent 60%);
}
.ai-card-title{
  font-size:12px;font-weight:600;color:var(--green);
  letter-spacing:.06em;
}
.ai-card-meta{font-size:11px;color:var(--text3)}
.ai-card-body{padding:4px 0}
.ai-rank-item{
  display:flex;align-items:flex-start;gap:14px;
  padding:12px 16px;border-bottom:1px solid var(--border);
  transition:background .12s;
}
.ai-rank-item:last-child{border-bottom:none}
.ai-rank-item:hover{background:var(--bg3)}
.ai-rank-badge{
  flex:0 0 30px;height:30px;border-radius:6px;
  border:1.5px solid;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);font-size:11px;font-weight:700;
  margin-top:2px;flex-shrink:0;
}
.ai-rank-info{flex:1;min-width:0}
.ai-rank-stock{display:flex;align-items:center;gap:6px;margin-bottom:4px;flex-wrap:wrap}
.ai-rank-reason{font-size:12px;color:var(--text2);line-height:1.6}
.ai-score{
  flex:0 0 auto;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:0;
}
.ai-score-val{font-family:var(--mono);font-size:18px;font-weight:700}
.ai-score-label{font-size:10px;color:var(--text3)}
.ai-card-footer{
  padding:8px 16px;border-top:1px solid var(--border);
  font-size:11px;color:var(--text3);background:var(--bg3);
}
.ai-card-empty{
  padding:28px 16px;text-align:center;font-size:13px;color:var(--text3);
}

/* ── Industry bar chart ──────────────────────── */
.industry-chart{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--radius);padding:14px 16px;
  margin-bottom:16px;box-shadow:var(--shadow-sm);
}
.industry-chart-hd{
  font-size:11px;font-weight:600;color:var(--text2);
  letter-spacing:.04em;margin-bottom:12px;
}
.ind-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.ind-bar-row:last-child{margin-bottom:0}
.ind-bar-label{
  font-size:12px;color:var(--text2);width:76px;flex-shrink:0;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.ind-bar-track{
  flex:1;background:var(--bg3);border-radius:4px;height:22px;overflow:hidden;
}
.ind-bar-fill{
  height:100%;background:var(--green-dim);border-right:2px solid var(--green);
  border-radius:4px;display:flex;align-items:center;padding:0 8px;
  min-width:28px;transition:width .4s ease;
}
.ind-bar-count{
  font-family:var(--mono);font-size:11px;font-weight:600;
  color:var(--green);white-space:nowrap;
}
.ind-bar-avg{
  font-family:var(--mono);font-size:11px;color:var(--text3);
  width:52px;text-align:right;flex-shrink:0;
}

/* ════════════════════════════════════════════════
   RESPONSIVE  (RWD)
════════════════════════════════════════════════ */

/* ── ≤1024px: tighten sidebar ─────────────────── */
@media(max-width:1024px){
  .page-layout{grid-template-columns:1fr 200px}
}

/* ── ≤768px: single column ───────────────────── */
@media(max-width:768px){
  .page-inner{padding:0 16px}

  header{height:50px}
  .logo{font-size:15px}
  .header-meta{display:none}

  thead th:last-child{white-space:normal;min-width:80px}
  .tag-cell{gap:2px}

.page-layout{
    grid-template-columns:1fr;
    padding:0 16px 48px;gap:16px;
  }
  main{padding:16px 0 0}

  .watchlist-sidebar{
    position:static;
    order:2;
  }

  .summary-row{grid-template-columns:1fr 1fr}

  .table-wrap{border-radius:8px}
  .table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}

  /* 隱藏次要欄位：僅隱藏趨勢圖欄（第6欄），保留乖離率（第3欄） */
  thead th:nth-child(6),
  tbody td:nth-child(6){display:none}
}

/* ── ≤480px: compact ─────────────────────────── */
@media(max-width:480px){
  .summary-row{grid-template-columns:1fr 1fr}
  .summary-value{font-size:17px}

  .strat-tab{padding:10px 12px 11px;font-size:12px}

thead th:nth-child(4),
  tbody td:nth-child(4){display:none}
}

/* ── Performance tracking ─────────────────────── */
.perf-modal{
  position:fixed;inset:0;background:rgba(0,0,0,0.65);
  display:flex;align-items:center;justify-content:center;z-index:200;
}
.perf-modal-box{
  background:var(--bg2);border:1px solid var(--border2);
  border-radius:var(--radius);padding:24px 28px;max-width:480px;width:92%;
}
.perf-modal-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:12px}
.perf-modal-desc{font-size:12px;color:var(--text2);line-height:1.8;margin-bottom:8px}
.perf-modal-desc code{
  background:var(--bg3);border:1px solid var(--border);
  border-radius:3px;padding:1px 5px;font-family:var(--mono);font-size:11px;color:var(--amber);
}
.perf-input{
  background:var(--bg3);border:1px solid var(--border2);border-radius:6px;
  color:var(--text);font-family:var(--mono);font-size:12px;
  padding:6px 10px;outline:none;transition:border-color .15s;
}
.perf-input:focus{border-color:var(--green)}
.perf-input-label{font-size:10px;color:var(--text3);margin-bottom:4px;letter-spacing:.04em;text-transform:uppercase}
.perf-chart-wrap{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--radius);padding:16px;margin-bottom:20px;
  height:280px;position:relative;box-shadow:var(--shadow-sm);
}
.perf-section{margin-bottom:24px}
.perf-section-hd{
  display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;
}
.perf-btn{
  font-size:12px;font-weight:500;padding:5px 12px;border-radius:6px;
  border:1px solid var(--border2);background:var(--bg3);
  color:var(--text2);cursor:pointer;font-family:var(--sans);
  transition:all .15s;white-space:nowrap;
}
.perf-btn:hover{border-color:var(--text3);color:var(--text)}
.perf-btn-confirm{background:var(--green);border-color:var(--green);color:#0d1117;font-weight:700}
.perf-btn-confirm:hover{filter:brightness(1.12)}
.perf-btn-exit{border-color:rgba(240,136,62,0.4);color:var(--amber);background:rgba(240,136,62,0.08)}

<body>

<!-- Two-column layout -->

<script>
// ════════════════════════════════════════════════════
//  STRATEGY REGISTRY
//  新增選股策略只需在這裡加一筆 + 提供 data
// ════════════════════════════════════════════════════
const STRATEGIES = [
  {
    id: "chips_big_holder",
    name: "籌碼集中",
    shortName: "籌碼集中",
    icon: "◈",
    available: true,
    description: "週末籌碼海選：追蹤千張大戶與 400 張大戶持股相對成長率（R），標記持續成長、雙軌觸發、單周增幅三類標籤，篩選低基期且量能充足的標的。",
    conditions: [
      "5日均量 > 500 張",
      "千張大戶比例 > 30%",
      "股價乖離 EMA120：±10% 以內",
      "🏷 持續成長 +1：連續兩週 R > 0%",
      "🏷 雙軌觸發 +3：R_400 ≥ 2.0% 或 R_1000 ≥ 1.25%",
      "🏷 單周增幅 +5：任一門檻單週 R > 3.0%",
    ],
    dataUpdated: "載入中...",
    dataSource: "集保開放資料 + FinMind",
    dataKey: "chips_big_holder_data",
  },
  {
    id: "volume_signal",
    name: "量增訊號",
    shortName: "量增訊號",
    icon: "◆",
    available: true,
    description: "每日盤後針對籌碼集中入池標的掃描量能突破訊號，捕捉主力啟動時機。",
    conditions: [
      "來源：籌碼集中入池標的",
      "當日成交量 ≥ 10日均量 × 1.5",
      "收盤價 > EMA5",
    ],
    dataUpdated: "載入中...",
    dataSource: "FinMind（每日盤後）",
    dataKey: "volume_signal_data",
  },
  {
    id: "stock_analysis",
    name: "標的分析",
    shortName: "標的分析",
    icon: "◎",
    available: true,
    description: "針對入池標的進行深度基本面與籌碼綜合分析。",
    conditions: [],
    comingSoon: "建置中",
  },
  {
    id: "performance",
    name: "績效追蹤",
    shortName: "績效追蹤",
    icon: "◐",
    available: true,
    description: "記錄建倉出場，追蹤整體投組績效。",
    conditions: [],
  },
];


// ════════════════════════════════════════════════════
//  DATA
// ════════════════════════════════════════════════════
const DATA = {
  chips_big_holder_data: [],
  volume_signal_data:    [],
  performance_data:      null,
};
let DATE_LABELS = [];

// ════════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════════
let activeStratId = STRATEGIES[0].id;
let sortCol = "cumulative_3w";
let sortAsc = false;
let chipsViewMode = "stock"; // "stock" | "industry"
let expandedRow = null;
let watchlist = JSON.parse(localStorage.getItem("watchlist") || "[]");
let aiData = null;

// ════════════════════════════════════════════════════
//  TRADINGVIEW APP DEEP LINK
//  手機上優先呼出 TradingView App（需已安裝），
//  未安裝時 fallback 到網頁版；桌機直接開新分頁。
// ════════════════════════════════════════════════════
function openTV(tvSymbol, event) {
  event.stopPropagation();
  event.preventDefault();
  const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
  // 使用完整 https URL；iOS/Android 上 TradingView 已註冊 universal link，
  // 安裝後會自動攔截並在 App 內開啟正確標的圖表。
  const webUrl = `https://www.tradingview.com/chart/?symbol=${tvSymbol}`;
  if (isMobile) {
    // 先嘗試 custom scheme（冒號不編碼，App 才能正確解析 symbol）
    const appUrl = `tradingview://chart?symbol=${tvSymbol}`;
    const t0 = Date.now();
    window.location.href = appUrl;
    // App 未安裝時 300ms 後 fallback 到網頁版（universal link）
    setTimeout(() => {
      if (Date.now() - t0 < 800) window.open(webUrl, '_blank');
    }, 300);
  } else {
    window.open(webUrl, '_blank');
  }
}

// ════════════════════════════════════════════════════
//  EXCHANGE DETECTION
//  資料若有 market 欄位（"TWSE"/"TPEX"）優先採用，
//  否則依代號範圍推算（非 100% 精確）
// ════════════════════════════════════════════════════
function guessMarket(stockId) {
  const n = parseInt(stockId, 10);
  if (n >= 1000 && n <= 2999) return 'TWSE';   // 上市
  if (n >= 3000 && n <= 3499) return 'TWSE';   // 上市居多
  if (n >= 3500 && n <= 3999) return 'TPEX';   // 上櫃居多
  if (n >= 4000 && n <= 4999) return 'TPEX';   // 上櫃
  if (n >= 5000 && n <= 5999) return 'TPEX';   // 上櫃居多
  if (n >= 6000 && n <= 6999) return 'TPEX';   // 上櫃居多
  if (n >= 7000 && n <= 9999) return 'TPEX';   // 上櫃
  return 'TWSE';                                 // fallback
}

function getTVSymbol(d) {
  const market = d.market || guessMarket(d.stock_id);
  return `${market}:${d.stock_id}`;
}

// ════════════════════════════════════════════════════
//  RENDER HELPERS
// ════════════════════════════════════════════════════
function sparkBars(trend) {
  const min = Math.min(...trend), max = Math.max(...trend);
  const range = max - min || 1;
  return trend.map(v => {
    const h = Math.round(((v - min) / range) * 18) + 6;
    return `<span class="spark-bar" style="height:${h}px"></span>`;
  }).join('');
}

function trendBars(trend, label, colorClass) {
  const max = Math.max(...trend);
  return [...trend].reverse().map((v, i) => `
    <div class="trend-row">
      <span class="trend-date">${DATE_LABELS[DATE_LABELS.length - 1 - i]}</span>
      <div class="trend-bar-wrap">
        <div class="trend-bar ${colorClass}" style="width:${(v/max*100).toFixed(1)}%"></div>
      </div>
      <span class="trend-val">${v.toFixed(2)}%</span>
    </div>`).join('');
}

// ════════════════════════════════════════════════════
//  RENDER STRATEGY TABS
// ════════════════════════════════════════════════════
function renderNav() {
  const nav = document.getElementById('strategyNav');
  nav.innerHTML = STRATEGIES.map(s => {
    let badgeText;
    if (!s.available) {
      badgeText = '—';
    } else if (s.id === 'performance') {
      const active = (DATA.performance_data?.positions || []).filter(p => !p.confirmed).length;
      badgeText = active;
    } else if (s.id === 'stock_analysis') {
      badgeText = '—';
    } else {
      badgeText = (DATA[s.dataKey] || []).length;
    }
    const badge = `<span class="badge">${badgeText}</span>`;
    return `<button class="strat-tab ${s.id===activeStratId?'active':''} ${!s.available?'locked':''}"
      onclick="${s.available ? `setStrategy('${s.id}')` : ''}"
      title="${!s.available ? (s.comingSoon||'即將推出') : ''}">
      ${s.icon} ${s.shortName}${badge}
    </button>`;
  }).join('');
}

// ════════════════════════════════════════════════════
//  RENDER ACTIVE STRATEGY
// ════════════════════════════════════════════════════
function renderStrategy() {
  const strat = STRATEGIES.find(s => s.id === activeStratId);
  const main = document.getElementById('mainContent');

  if (!strat.available) {
    main.innerHTML = `<div class="coming-soon">
      <div class="coming-icon">${strat.icon}</div>
      <div class="coming-title">${strat.name}</div>
      <div class="coming-desc">${strat.description}<br><br><span style="color:var(--amber)">${strat.comingSoon}</span></div>
    </div>`;
    return;
  }

  if (strat.id === 'chips_big_holder') { renderChipsHolder(strat, main); return; }
  if (strat.id === 'volume_signal')    { renderVolumeSignal(strat, main); return; }
  if (strat.id === 'performance')      { renderPerformance(strat, main);  return; }
  if (strat.id === 'stock_analysis') {
    main.innerHTML = `<div class="coming-soon">
      <div class="coming-icon">◎</div>
      <div class="coming-title">標的分析</div>
      <div class="coming-desc">深度基本面與籌碼綜合分析<br>即將推出</div>
    </div>`;
    return;
  }

  const data = (DATA[strat.dataKey] || []).slice().sort((a,b) => {
    const va = a[sortCol], vb = b[sortCol];
    return sortAsc ? va - vb : vb - va;
  });

  const maxChg = Math.max(...data.map(d => d.big_4w_chg));

  // Summary cards
  const summaryHTML = `
    <div class="summary-row">
      <div class="summary-card">
        <div class="summary-label">篩選結果</div>
        <div class="summary-value green">${data.length}</div>
        <div class="summary-sub">符合全部條件</div>
      </div>
      <div class="summary-card">
        <div class="summary-label">最大增幅</div>
        <div class="summary-value amber">+${maxChg.toFixed(2)}%</div>
        <div class="summary-sub">兩門檻 4 週增持幅度</div>
      </div>
      <div class="summary-card">
        <div class="summary-label">資料日期</div>
        <div class="summary-value" style="font-size:16px;font-family:var(--mono)">${strat.dataUpdated}</div>
        <div class="summary-sub">${strat.dataSource}</div>
      </div>
      <div class="summary-card">
        <div class="summary-label">篩選範圍</div>
        <div class="summary-value" style="font-size:16px">全市場</div>
        <div class="summary-sub">日量 ≥ 1,000 張</div>
      </div>
    </div>`;

  // Conditions
  const condsHTML = `<div class="conditions">
    ${strat.conditions.map(c => `<div class="cond"><span class="cond-dot"></span>${c}</div>`).join('')}
  </div>`;

  // Table
  const sortIcon = (col) => `<span class="sort-icon">${sortCol===col ? (sortAsc?'↑':'↓') : '·'}</span>`;
  const vscrollClass = data.length > 10 ? 'table-vscroll' : '';
  const tableHTML = `
    <div class="table-wrap">
      <div class="table-toolbar">
        <span class="table-title">篩選結果</span>
        <div class="toolbar-right">
          <span class="updated-tag">更新：${strat.dataUpdated}</span>
          <button class="btn-csv" onclick="exportCSV()" title="匯出目前篩選結果為 CSV">
            ↓ 匯出 CSV
          </button>
        </div>
      </div>
      <div class="table-scroll ${vscrollClass}">
      <table id="resultsTable">
        <thead>
          <tr>
            <th onclick="sort('stock_id')">代號 / 名稱${sortIcon('stock_id')}</th>
            <th onclick="sort('close')" data-tip="最新收盤價">現價${sortIcon('close')}</th>
            <th onclick="sort('deviation')" data-tip="(現價 − EMA120) / EMA120">乖離 EMA120${sortIcon('deviation')}</th>
            <th onclick="sort('big_pct_latest')" data-tip="最新週千張大戶（≥1000張）持股比例">大戶比例${sortIcon('big_pct_latest')}</th>
            <th onclick="sort('big_4w_chg')" data-tip="近4週大戶比例增幅">4週增幅${sortIcon('big_4w_chg')}</th>
            <th data-tip="4週大戶持股趨勢">趨勢</th>
          </tr>
        </thead>
        <tbody>
          ${data.map(d => renderRow(d)).join('')}
        </tbody>
      </table>
      </div>
    </div>`;

  main.innerHTML = `
    <div class="strategy-panel active">
      <div class="strat-header">
        <div class="strat-title">${strat.icon} ${strat.name}策略</div>
        <div class="strat-desc">${strat.description}</div>
      </div>
      ${condsHTML}
      ${summaryHTML}
      ${tableHTML}
    </div>`;

  // 更新右側 sidebar
  const grid = document.getElementById('watchlistGrid');
  if (grid) grid.innerHTML = renderWatchlist();
}

function renderRow(d) {
  const devClass = d.deviation < 0 ? 'neg' : 'pos';
  const devSign  = d.deviation > 0 ? '+' : '';
  const inWatch  = watchlist.includes(d.stock_id);
  return `
    <tr onclick="toggleExpand('${d.stock_id}')" id="row-${d.stock_id}">
      <td>
        <a href="https://www.tradingview.com/chart/?symbol=${getTVSymbol(d)}"
          onclick="openTV('${getTVSymbol(d)}', event)"
          style="text-decoration:none;display:inline-block">
          <div class="stock-code" style="display:flex;align-items:center;gap:5px">
            ${d.stock_id}
            <span style="font-size:9px;opacity:.45;font-family:var(--mono)">↗</span>
          </div>
          <div class="stock-name">${d.name}</div>
        </a>
        <div class="stock-industry">${d.industry}</div>
      </td>
      <td><span class="price-cell">${d.close != null ? d.close.toFixed(1) : '—'}</span></td>
      <td>
        <span class="ema-cell">${d.ema120 != null ? d.ema120.toFixed(2) : '—'}</span><br>
        <span class="deviation ${devClass}">${d.deviation != null ? devSign + d.deviation.toFixed(2) + '%' : '—'}</span>
      </td>
      <td><span class="big-pct">${d.big_pct_latest.toFixed(2)}%</span></td>
      <td>
        <span class="big-pct">${d.big_4w_chg > 0 ? '+' : ''}${d.big_4w_chg.toFixed(2)}%</span>
        <span class="big-chg">+${d.big_4w_chg.toFixed(2)}</span>
      </td>
      <td><div class="spark">${sparkBars(d.big_trend)}</div></td>
    </tr>
    <tr class="expand-row" id="expand-${d.stock_id}" style="display:none">
      <td colspan="6">
        <div class="expand-content">
          <div class="expand-section">
            <h4>千張大戶趨勢</h4>
            ${trendBars(d.big_trend, '千張', '')}
          </div>
          <div class="expand-section">
            <h4>400張大戶趨勢</h4>
            ${DATA.chips_big_holder_400[d.stock_id]
              ? trendBars(DATA.chips_big_holder_400[d.stock_id].big_trend, '400張', '')
              : '<div style="color:var(--text3);font-size:12px;padding:4px 0">資料不足</div>'}
          </div>
          <div class="expand-section">
            <h4>操作</h4>
            <button onclick="event.stopPropagation();toggleWatch('${d.stock_id}','${d.name}')"
              style="background:${inWatch?'var(--green-dim)':'var(--bg3)'};border:1px solid ${inWatch?'var(--green)':'var(--border)'};color:${inWatch?'var(--green)':'var(--text2)'};padding:8px 14px;border-radius:6px;cursor:pointer;font-size:12px;font-family:var(--sans);width:100%;margin-bottom:8px"
              id="watchBtn-${d.stock_id}">
              ${inWatch ? '✓ 已加入觀察清單' : '+ 加入觀察清單'}
            </button>
            <a href="https://tw.stock.yahoo.com/quote/${d.stock_id}" target="_blank"
              onclick="event.stopPropagation()"
              style="display:block;text-align:center;background:var(--bg3);border:1px solid var(--border);color:var(--text2);padding:8px 14px;border-radius:6px;font-size:12px;text-decoration:none">
              Yahoo 股市 ↗
            </a>
          </div>
        </div>
      </td>
    </tr>`;
}

function renderWatchlist() {
  if (watchlist.length === 0) {
    return `<div class="watch-empty">點擊結果列<br>加入觀察清單</div>`;
  }
  // 跨策略查找名稱：遍歷所有有資料的策略
  function findName(sid) {
    for (const s of STRATEGIES) {
      if (!s.available || !s.dataKey) continue;
      const item = (DATA[s.dataKey] || []).find(d => d.stock_id === sid);
      if (item) return item.name;
    }
    return '—';
  }
  return watchlist.map(sid => {
    const name = findName(sid);
    return `<div class="watch-card">
      <span class="watch-card-code">${sid}</span>
      <span class="watch-card-name">${name}</span>
      <span class="watch-card-remove" onclick="event.stopPropagation();removeWatch('${sid}')">×</span>
    </div>`;
  }).join('');
}

// ════════════════════════════════════════════════════
//  AI 推薦卡片
// ════════════════════════════════════════════════════
function renderAICard() {
  if (!aiData) {
    return `<div class="ai-card">
      <div class="ai-card-header">
        <span class="ai-card-title">✦ AI 選股推薦</span>
        <span class="ai-card-meta">尚未載入</span>
      </div>
      <div class="ai-card-empty">AI 分析資料尚未產生，下次選股後自動更新</div>
    </div>`;
  }
  if (!aiData.ranked || aiData.ranked.length === 0) {
    return `<div class="ai-card">
      <div class="ai-card-header">
        <span class="ai-card-title">✦ AI 選股推薦</span>
      </div>
      <div class="ai-card-empty">本週無推薦標的</div>
    </div>`;
  }

  const top3 = aiData.ranked.slice(0, 3);
  const rankColors  = ['var(--green)', 'var(--amber)', 'var(--blue)'];
  const genTime = (aiData.generated_at || '').slice(0, 16).replace('T', ' ');

  const itemsHTML = top3.map((item, i) => `
    <div class="ai-rank-item">
      <div class="ai-rank-badge" style="color:${rankColors[i]};border-color:${rankColors[i]}">#${item.rank}</div>
      <div class="ai-rank-info">
        <div class="ai-rank-stock">
          <span class="stock-code">${item.stock_id}</span>
          <span style="font-size:13px;font-weight:500;color:var(--text)">${item.name}</span>
        </div>
        <div class="ai-rank-reason">${item.reason}</div>
      </div>
      <div class="ai-score">
        <span class="ai-score-val" style="color:${rankColors[i]}">${item.score}</span>
        <span class="ai-score-label">分</span>
      </div>
    </div>`).join('');

  return `<div class="ai-card">
    <div class="ai-card-header">
      <span class="ai-card-title">✦ AI 選股推薦</span>
      <span class="ai-card-meta">${aiData.model || 'gemini-2.0-flash'} · ${genTime}</span>
    </div>
    <div class="ai-card-body">${itemsHTML}</div>
    <div class="ai-card-footer">依波段偏好排序：大戶增持幅度 · 低乖離 · 基本面獲利能力</div>
  </div>`;
}

// ════════════════════════════════════════════════════
//  INTERACTIONS
// ════════════════════════════════════════════════════
function setStrategy(id) {
  activeStratId = id;
  expandedRow = null;
  renderNav();
  renderStrategy();
}

function sort(col) {
  if (sortCol === col) sortAsc = !sortAsc;
  else { sortCol = col; sortAsc = false; }
  renderStrategy();
}

function toggleExpand(sid) {
  const prev = expandedRow;
  if (prev) {
    document.getElementById(`expand-${prev}`).style.display = 'none';
    document.getElementById(`row-${prev}`).classList.remove('expanded');
  }
  if (prev !== sid) {
    document.getElementById(`expand-${sid}`).style.display = 'table-row';
    document.getElementById(`row-${sid}`).classList.add('expanded');
    expandedRow = sid;
  } else {
    expandedRow = null;
  }
}


function toggleWatch(sid, name) {
  if (watchlist.includes(sid)) {
    watchlist = watchlist.filter(s => s !== sid);
  } else {
    watchlist.push(sid);
  }
  localStorage.setItem("watchlist", JSON.stringify(watchlist));
  const btn = document.getElementById(`watchBtn-${sid}`);
  if (btn) {
    const inWatch = watchlist.includes(sid);
    btn.textContent = inWatch ? '✓ 已加入觀察清單' : '+ 加入觀察清單';
    btn.style.background = inWatch ? 'var(--green-dim)' : 'var(--bg3)';
    btn.style.borderColor = inWatch ? 'var(--green)' : 'var(--border)';
    btn.style.color = inWatch ? 'var(--green)' : 'var(--text2)';
  }
  const grid = document.getElementById('watchlistGrid');
  if (grid) grid.innerHTML = renderWatchlist();
}

function removeWatch(sid) {
  watchlist = watchlist.filter(s => s !== sid);
  localStorage.setItem("watchlist", JSON.stringify(watchlist));
  const grid = document.getElementById('watchlistGrid');
  if (grid) grid.innerHTML = renderWatchlist();
}

function exportCSV() {
  const strat = STRATEGIES.find(s => s.id === activeStratId);
  const data = DATA[strat.dataKey] || [];
  if (!data.length) return;

  const dateRow = DATE_LABELS.length ? DATE_LABELS.join(' / ') : strat.dataUpdated;
  const headers = [
    '代號', '名稱', '產業',
    '現價', '乖離EMA120(%)',
    '大戶比例(%)', '4週增幅(%)',
    `大戶趨勢(${dateRow})`,
    `散戶趨勢(${dateRow})`,
    '資料日期'
  ];

  const rows = data.map(d => [
    d.stock_id,
    d.name,
    d.industry || '',
    d.close.toFixed(1),
    (d.deviation >= 0 ? '+' : '') + d.deviation.toFixed(2),
    d.big_pct_latest.toFixed(2),
    (d.big_4w_chg >= 0 ? '+' : '') + d.big_4w_chg.toFixed(2),
    d.big_trend   ? d.big_trend.map(v => v.toFixed(2)).join(' / ')   : '',
    d.retail_trend? d.retail_trend.map(v => v.toFixed(2)).join(' / '): '',
    strat.dataUpdated
  ]);

  const csv = [headers, ...rows]
    .map(r => r.map(v => `"${String(v).replace(/"/g, '""')}"`).join(','))
    .join('\r\n');

  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `${strat.id}_${strat.dataUpdated}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

// ════════════════════════════════════════════════════
//  族群柱狀圖 TOP 6（按入選數量，同數量以平均增幅排序）
// ════════════════════════════════════════════════════
function renderIndustryChart(allData) {
  const groups = {};
  allData.forEach(d => {
    const ind = d.industry || '其他';
    if (!groups[ind]) groups[ind] = [];
    groups[ind].push(d);
  });
  const top6 = Object.entries(groups)
    .map(([name, items]) => ({
      name,
      count: items.length,
      avg: items.reduce((s, d) => s + (d.cumulative_3w || 0), 0) / items.length
    }))
    .sort((a, b) => b.count !== a.count ? b.count - a.count : b.avg - a.avg)
    .slice(0, 6);
  if (!top6.length) return '';
  const maxCount = top6[0].count;
  const bars = top6.map(g => {
    const pct = (g.count / maxCount * 100).toFixed(1);
    const avgSign = g.avg >= 0 ? '+' : '';
    return `<div class="ind-bar-row">
      <div class="ind-bar-label" title="${g.name}">${g.name}</div>
      <div class="ind-bar-track">
        <div class="ind-bar-fill" style="width:${pct}%">
          <span class="ind-bar-count">${g.count} 支</span>
        </div>
      </div>
      <div class="ind-bar-avg">${avgSign}${g.avg.toFixed(2)}%</div>
    </div>`;
  }).join('');
  return `<div class="industry-chart">
    <div class="industry-chart-hd">族群分布 TOP 6　<span style="font-weight:400;color:var(--text3)">依入選數量 / 同數量以平均3週增幅排序</span></div>
    ${bars}
  </div>`;
}

// ════════════════════════════════════════════════════
//  籌碼集中：渲染器
// ════════════════════════════════════════════════════
function renderChipsHolder(strat, main) {
  const allData = DATA.chips_big_holder_data || [];

  if (allData.length === 0) {
    main.innerHTML = `<div class="coming-soon">
      <div class="coming-icon">${strat.icon}</div>
      <div class="coming-title">${strat.name}</div>
      <div class="coming-desc">資料尚未產生，請至 GitHub Actions → <b>大戶持股分析</b> → <b>Run workflow</b><br>執行後約 5 分鐘資料將自動更新。</div>
    </div>`;
    return;
  }

  // 排序（個股模式）
  const sortedData = allData.slice().sort((a, b) => {
    const va = a[sortCol] ?? -9999, vb = b[sortCol] ?? -9999;
    if (va !== vb) return sortAsc ? va - vb : vb - va;
    // 同分時以三周累積增幅降序為次要排序
    return (b.cumulative_3w || 0) - (a.cumulative_3w || 0);
  });

  // 族群模式：按族群平均三周累積增幅分組
  function buildIndustryGroups(data) {
    const groups = {};
    data.forEach(d => {
      const ind = d.industry || '其他';
      if (!groups[ind]) groups[ind] = [];
      groups[ind].push(d);
    });
    return Object.entries(groups).map(([name, items]) => {
      const avg = items.reduce((s, d) => s + (d.cumulative_3w || 0), 0) / items.length;
      items.sort((a, b) => (b.cumulative_3w || 0) - (a.cumulative_3w || 0));
      return { name, items, avg: Math.round(avg * 100) / 100 };
    }).sort((a, b) => b.avg - a.avg);
  }

  const tagColor = { '持續成長': '#3a86ff', '雙軌觸發': '#e66e29', '單周增幅': '#e63946' };

  function tagBadges(tags) {
    if (!tags || !tags.length) return '';
    return tags.map(t =>
      `<span class="tag-badge" style="background:${tagColor[t] || '#888'}">${t}</span>`
    ).join('');
  }

  function chipsRow(d) {
    const devSign  = d.deviation >= 0 ? '+' : '';
    const weekSign = (d.week_chg_pct >= 0) ? '+' : '';
    const weekClass = d.week_chg_pct >= 0 ? 'pos' : 'neg';
    const devClass  = d.deviation  >= 0 ? 'pos' : 'neg';
    const cum3Sign  = (d.cumulative_3w || 0) >= 0 ? '+' : '';
    const inWatch   = watchlist.includes(d.stock_id);
    return `
      <tr onclick="toggleExpand('${d.stock_id}')" id="row-${d.stock_id}">
        <td>
          <a href="https://www.tradingview.com/chart/?symbol=${getTVSymbol(d)}"
            onclick="openTV('${getTVSymbol(d)}', event)"
            style="text-decoration:none;display:inline-block">
            <div class="stock-code" style="display:flex;align-items:center;gap:5px">
              ${d.stock_id}<span style="font-size:9px;opacity:.45;font-family:var(--mono)">↗</span>
            </div>
            <div class="stock-name">${d.name}</div>
          </a>
          <div class="stock-industry">${d.industry || ''}</div>
        </td>
        <td><span class="price-cell">${d.close != null ? d.close.toFixed(1) : '—'}</span></td>
        <td><span class="deviation ${weekClass}">${d.week_chg_pct != null ? weekSign + d.week_chg_pct.toFixed(2) + '%' : '—'}</span></td>
        <td>
          <span class="ema-cell">${d.ema120 != null ? d.ema120.toFixed(2) : '—'}</span><br>
          <span class="deviation ${devClass}">${d.deviation != null ? devSign + d.deviation.toFixed(2) + '%' : '—'}</span>
        </td>
        <td><span class="big-pct">${d.big_pct_1000 != null ? d.big_pct_1000.toFixed(2) + '%' : '—'}</span></td>
        <td><span class="big-pct ${(d.cumulative_3w || 0) >= 0 ? 'pos' : 'neg'}">${d.cumulative_3w != null ? cum3Sign + d.cumulative_3w.toFixed(2) + '%' : '—'}</span></td>
        <td><div class="spark">${sparkBars(d.big_trend_1000 || [])}</div></td>
        <td><div class="tag-cell">${tagBadges(d.tags)}</div></td>
      </tr>
      <tr class="expand-row" id="expand-${d.stock_id}" style="display:none">
        <td colspan="8">
          <div class="expand-flat">
            <div class="expand-trend-wrap">
              ${(() => {
                const labels = d.date_labels || DATE_LABELS;
                const t1000  = d.big_trend_1000 || [];
                const t400   = d.big_trend_400  || [];
                const cum1000 = t1000.length >= 3 ? t1000[t1000.length-1] - t1000[t1000.length-3] : null;
                const cum400  = t400.length  >= 3 ? t400[t400.length-1]   - t400[t400.length-3]   : null;
                const cum1000Sign = cum1000 != null && cum1000 >= 0 ? '+' : '';
                const cum400Sign  = cum400  != null && cum400  >= 0 ? '+' : '';
                const dateHdrs = [...labels].reverse().map(l => `<th>${l}</th>`).join('');
                const cells1000 = [...t1000].reverse().map(v => `<td>${v.toFixed(2)}%</td>`).join('');
                const cells400  = [...t400].reverse().map(v  => `<td>${v.toFixed(2)}%</td>`).join('');
                return `<table class="expand-table">
                  <thead><tr>
                    <th></th><th>3週增幅</th>${dateHdrs}
                  </tr></thead>
                  <tbody>
                    <tr>
                      <td>千張大戶</td>
                      <td class="expand-cum ${cum1000!=null&&cum1000>=0?'pos':'neg'}">${cum1000!=null?cum1000Sign+cum1000.toFixed(2)+'%':'—'}</td>
                      ${cells1000}
                    </tr>
                    <tr>
                      <td>400張大戶</td>
                      <td class="expand-cum ${cum400!=null&&cum400>=0?'pos':'neg'}">${cum400!=null?cum400Sign+cum400.toFixed(2)+'%':'—'}</td>
                      ${cells400}
                    </tr>
                  </tbody>
                </table>`;
              })()}
            </div>
            <div class="expand-actions">
              <button onclick="event.stopPropagation();toggleWatch('${d.stock_id}','${d.name}')"
                style="background:${inWatch?'var(--green-dim)':'var(--bg3)'};border:1px solid ${inWatch?'var(--green)':'var(--border)'};color:${inWatch?'var(--green)':'var(--text2)'};padding:8px 14px;border-radius:6px;cursor:pointer;font-size:12px;font-family:var(--sans);white-space:nowrap"
                id="watchBtn-${d.stock_id}">
                ${inWatch ? '✓ 已加入' : '+ 加入觀察清單'}
              </button>
            </div>
          </div>
        </td>
      </tr>`;
  }

  function industryGroupHTML(groups) {
    return groups.map(g => {
      const avgSign = g.avg >= 0 ? '+' : '';
      const rows = g.items.map(d => chipsRow(d)).join('');
      return `
        <tr class="industry-header-row">
          <td colspan="8">
            <span class="industry-name">${g.name}</span>
            <span class="industry-avg">平均3週增幅 ${avgSign}${g.avg.toFixed(2)}%</span>
            <span class="industry-count">${g.items.length} 支</span>
          </td>
        </tr>
        ${rows}`;
    }).join('');
  }

  const sortIcon = col => `<span class="sort-icon">${sortCol===col ? (sortAsc?'↑':'↓') : '·'}</span>`;
  const vscrollClass = allData.length > 10 ? 'table-vscroll' : '';
  const maxCum = Math.max(...allData.map(d => d.cumulative_3w || 0));

  const tableBody = chipsViewMode === 'stock'
    ? sortedData.map(d => chipsRow(d)).join('')
    : industryGroupHTML(buildIndustryGroups(allData));

  main.innerHTML = `
    <div class="strategy-panel active">
      <div class="strat-header">
        <div class="strat-title">${strat.icon} ${strat.name}策略</div>
        <div class="strat-desc">${strat.description}</div>
      </div>
      <div class="conditions">
        ${strat.conditions.map(c => `<div class="cond"><span class="cond-dot"></span>${c}</div>`).join('')}
      </div>
      <div class="summary-row">
        <div class="summary-card">
          <div class="summary-label">入池標的</div>
          <div class="summary-value green">${allData.length}</div>
          <div class="summary-sub">符合全部條件</div>
        </div>
        <div class="summary-card">
          <div class="summary-label">最高3週增幅</div>
          <div class="summary-value amber">${maxCum >= 0 ? '+' : ''}${maxCum.toFixed(2)}%</div>
          <div class="summary-sub">千張大戶累積增幅</div>
        </div>
        <div class="summary-card">
          <div class="summary-label">資料日期</div>
          <div class="summary-value" style="font-size:16px;font-family:var(--mono)">${strat.dataUpdated}</div>
          <div class="summary-sub">${strat.dataSource}</div>
        </div>
        <div class="summary-card">
          <div class="summary-label">排列方式</div>
          <div style="display:flex;gap:6px;margin-top:6px">
            <button class="view-btn ${chipsViewMode==='stock'?'active':''}" onclick="setChipsView('stock')">個股</button>
            <button class="view-btn ${chipsViewMode==='industry'?'active':''}" onclick="setChipsView('industry')">族群</button>
          </div>
        </div>
      </div>
      ${renderIndustryChart(allData)}
      <div class="table-wrap">
        <div class="table-toolbar">
          <span class="table-title">篩選結果</span>
          <div class="toolbar-right">
            <span class="updated-tag">更新：${strat.dataUpdated}</span>
            <button class="btn-csv" onclick="exportCSVChips()" title="匯出 CSV">↓ 匯出 CSV</button>
          </div>
        </div>
        <div class="table-scroll ${vscrollClass}">
        <table id="resultsTable">
          <thead>
            <tr>
              <th onclick="chipsSort('stock_id')">代號 / 名稱${sortIcon('stock_id')}</th>
              <th onclick="chipsSort('close')">現價${sortIcon('close')}</th>
              <th onclick="chipsSort('week_chg_pct')">周漲跌${sortIcon('week_chg_pct')}</th>
              <th onclick="chipsSort('deviation')" data-tip="(現價-EMA120)/EMA120">乖離EMA120${sortIcon('deviation')}</th>
              <th onclick="chipsSort('big_pct_1000')" data-tip="千張大戶持股%">大戶比例${sortIcon('big_pct_1000')}</th>
              <th onclick="chipsSort('cumulative_3w')" data-tip="千張大戶3週累積增幅R">三周累積增幅${sortIcon('cumulative_3w')}</th>
              <th>趨勢</th>
              <th onclick="chipsSort('tag_score')" data-tip="依積分排序：單周增幅+5、雙軌觸發+3、持續成長+1">篩選條件${sortIcon('tag_score')}</th>
            </tr>
          </thead>
          <tbody>${tableBody}</tbody>
        </table>
        </div>
      </div>
    </div>`;

  const grid = document.getElementById('watchlistGrid');
  if (grid) grid.innerHTML = renderWatchlist();
}

function setChipsView(mode) {
  chipsViewMode = mode;
  const strat = STRATEGIES.find(s => s.id === 'chips_big_holder');
  renderChipsHolder(strat, document.getElementById('mainContent'));
}

function chipsSort(col) {
  if (sortCol === col) sortAsc = !sortAsc;
  else { sortCol = col; sortAsc = false; }
  const strat = STRATEGIES.find(s => s.id === 'chips_big_holder');
  renderChipsHolder(strat, document.getElementById('mainContent'));
}

function exportCSVChips() {
  const data = DATA.chips_big_holder_data || [];
  if (!data.length) return;
  const strat = STRATEGIES.find(s => s.id === 'chips_big_holder');
  const headers = ['代號','名稱','族群','現價','周漲跌(%)','乖離EMA120(%)','大戶比例(%)','三周累積增幅(%)','標籤','分數'];
  const rows = data.map(d => [
    d.stock_id, d.name, d.industry || '',
    d.close?.toFixed(1) || '',
    d.week_chg_pct != null ? d.week_chg_pct.toFixed(2) : '',
    d.deviation != null ? d.deviation.toFixed(2) : '',
    d.big_pct_1000?.toFixed(2) || '',
    d.cumulative_3w != null ? d.cumulative_3w.toFixed(2) : '',
    (d.tags || []).join(' '),
    d.tag_score || 0,
  ]);
  const csv = [headers, ...rows].map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\r\n');
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' });
  const a = Object.assign(document.createElement('a'), { href: URL.createObjectURL(blob), download: `chips_${strat.dataUpdated}.csv` });
  a.click();
}

// ════════════════════════════════════════════════════
//  GITHUB API HELPERS
// ════════════════════════════════════════════════════
const GH_OWNER = 'weeiywun';
const GH_REPO  = 'twstockscan';
const GH_PERF  = 'data/performance.json';

function ghToken() { return localStorage.getItem('gh_token') || ''; }

async function ghWritePerf(data) {
  const token = ghToken();
  if (!token) { alert('請先設定 GitHub Token'); return false; }
  try {
    const infoRes = await fetch(
      `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${GH_PERF}`,
      { headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json' } }
    );
    if (!infoRes.ok) throw new Error('讀取 SHA 失敗，請確認 Token 權限');
    const { sha } = await infoRes.json();
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))));
    const writeRes = await fetch(
      `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${GH_PERF}`,
      {
        method: 'PUT',
        headers: { Authorization: `token ${token}`, 'Content-Type': 'application/json', Accept: 'application/vnd.github.v3+json' },
        body: JSON.stringify({
          message: `perf: update ${new Date().toISOString().slice(0, 10)}`,
          content, sha
        })
      }
    );
    if (!writeRes.ok) { const e = await writeRes.json(); throw new Error(e.message || '寫入失敗'); }
    return true;
  } catch(e) { alert('儲存失敗：' + e.message); return false; }
}

function openTokenModal() {
  const m = document.getElementById('tokenModal');
  if (m) { m.style.display = 'flex'; const inp = document.getElementById('tokenInput'); if(inp) inp.value = ghToken(); }
}
function closeTokenModal() {
  const m = document.getElementById('tokenModal'); if (m) m.style.display = 'none';
}
function saveToken() {
  const val = document.getElementById('tokenInput')?.value?.trim();
  if (val) localStorage.setItem('gh_token', val); else localStorage.removeItem('gh_token');
  closeTokenModal(); renderStrategy();
}

// ════════════════════════════════════════════════════
//  PERFORMANCE — 指標計算
// ════════════════════════════════════════════════════
function computePortfolioMetrics(pd) {
  const startCap = pd?.starting_capital || 450000;
  const positions = pd?.positions || [];
  const priceHistory = pd?.price_history || {};
  const today = new Date().toISOString().slice(0, 10);
  let totalCost = 0, mktValue = 0, realizedPnl = 0;
  positions.forEach(p => {
    const cost = p.shares * p.cost_price;
    totalCost += cost;
    if (p.confirmed && p.exit_price != null) {
      const val = p.shares * p.exit_price;
      mktValue += val; realizedPnl += val - cost;
    } else {
      const hist = priceHistory[p.stock_id] || {};
      const dates = Object.keys(hist).filter(d => d <= today).sort();
      const price = dates.length ? hist[dates[dates.length - 1]] : p.cost_price;
      mktValue += p.shares * price;
    }
  });
  const cash = startCap - totalCost;
  const portfolioValue = cash + mktValue;
  const returnPct = positions.length ? ((portfolioValue / startCap) - 1) * 100 : 0;
  return { startCap, portfolioValue, returnPct, realizedPnl };
}

// ════════════════════════════════════════════════════
//  PERFORMANCE — 圖表資料
// ════════════════════════════════════════════════════
function buildPerfChartData(pd) {
  if (!pd || !(pd.positions || []).length) return null;
  const startCap = pd.starting_capital || 450000;
  const positions = pd.positions || [];
  const priceHistory = pd.price_history || {};
  const allDates = new Set();
  Object.values(priceHistory).forEach(h => Object.keys(h).forEach(d => allDates.add(d)));
  positions.forEach(p => { if (p.entry_date) allDates.add(p.entry_date); });
  const sorted = [...allDates].sort();
  if (sorted.length < 2) return null;
  const totalCost = positions.reduce((s, p) => s + p.shares * p.cost_price, 0);
  const cash = startCap - totalCost;
  const totalLine = [], realizedLine = [];
  sorted.forEach(date => {
    let mktVal = 0, realVal = 0;
    positions.forEach(p => {
      const cost = p.shares * p.cost_price;
      if (date < p.entry_date) { mktVal += cost; realVal += cost; return; }
      if (p.confirmed && p.exit_date && date >= p.exit_date) {
        const ev = p.shares * p.exit_price;
        mktVal += ev; realVal += ev;
      } else {
        const hist = priceHistory[p.stock_id] || {};
        const dates = Object.keys(hist).filter(d => d <= date).sort();
        const price = dates.length ? hist[dates[dates.length - 1]] : cost / p.shares;
        mktVal += p.shares * price; realVal += cost;
      }
    });
    totalLine.push(parseFloat(((cash + mktVal) / startCap * 100 - 100).toFixed(2)));
    realizedLine.push(parseFloat(((cash + realVal) / startCap * 100 - 100).toFixed(2)));
  });
  return { labels: sorted, totalLine, realizedLine };
}

// ════════════════════════════════════════════════════
//  PERFORMANCE — 圖表初始化

let perfChart = null;

  const canvas = document.getElementById('perfChart');
  if (!canvas || typeof Chart === 'undefined') return;
  if (perfChart) { perfChart.destroy(); perfChart = null; }
  const cd = buildPerfChartData(pd);
  perfChart = new Chart(canvas, {
    type: 'line',
    data: {
      labels: cd ? cd.labels : [],
      datasets: [
        {
          label: '總報酬（含持倉）',
          data: cd ? cd.totalLine : [],
          borderColor: '#f0883e', backgroundColor: 'transparent',
          borderWidth: 2, borderDash: [5, 4],
          pointRadius: cd && cd.labels.length < 30 ? 3 : 1, tension: 0.3,
        },
        {
          label: '已實現損益',
          data: cd ? cd.realizedLine : [],
          borderColor: '#3fb950', backgroundColor: 'rgba(63,185,80,0.1)',

          pointRadius: cd && cd.labels.length < 30 ? 3 : 1, tension: 0.3,
        }
      ]

    options: {
      responsive: true, maintainAspectRatio: false,

        tooltip: {
          backgroundColor: '#1c2128', titleColor: '#e6edf3',
          bodyColor: '#8b949e', borderColor: 'rgba(255,255,255,0.1)', borderWidth: 1,
          callbacks: { label: ctx => ` ${ctx.dataset.label}：${ctx.parsed.y >= 0 ? '+' : ''}${ctx.parsed.y.toFixed(2)}%` }
        }
      },

    }
  });
}

// ════════════════════════════════════════════════════
//  PERFORMANCE — 互動函式
// ════════════════════════════════════════════════════
function perfShowAddForm() {
  const row = document.getElementById('perfAddFormRow');
  const emptyRow = document.getElementById('perfEmptyRow');
  if (row) { row.style.display = 'table-row'; if (emptyRow) emptyRow.style.display = 'none'; }
  document.getElementById('af-sid')?.focus();
}

function perfShowExitForm(id) {
  const row = document.getElementById(`exit-form-${id}`);
  if (row) row.style.display = row.style.display === 'none' ? 'table-row' : 'none';
}

async function perfSaveAdd() {
  const sid    = document.getElementById('af-sid')?.value.trim();
  const name   = document.getElementById('af-name')?.value.trim();
  const date   = document.getElementById('af-date')?.value;
  const shares = parseFloat(document.getElementById('af-shares')?.value);
  const cost   = parseFloat(document.getElementById('af-cost')?.value);
  const tp     = parseFloat(document.getElementById('af-tp')?.value) || null;
  const sl     = parseFloat(document.getElementById('af-sl')?.value) || null;
  if (!sid || !date || !shares || !cost) { alert('請填寫必填欄位（標記 * 的欄位）'); return; }
  if (!DATA.performance_data) {
    DATA.performance_data = { starting_capital: 450000, last_updated: '', positions: [], price_history: {} };
  }
  const newPos = {
    id: 'p' + Date.now(), stock_id: sid, name: name || sid,
    entry_date: date, shares, cost_price: cost,
    tp_price: tp, sl_price: sl,
    exit_price: null, exit_date: null, confirmed: false
  };
  DATA.performance_data.positions.push(newPos);
  DATA.performance_data.last_updated = new Date().toISOString().slice(0, 10);
  const ok = await ghWritePerf(DATA.performance_data);
  if (ok) renderStrategy(); else DATA.performance_data.positions.pop();
}

async function perfConfirmExit(id) {
  const exitPrice = parseFloat(document.getElementById(`ep-${id}`)?.value);
  const exitDate  = document.getElementById(`ed-${id}`)?.value;
  if (!exitPrice || exitPrice <= 0 || !exitDate) { alert('請填寫賣出價格與日期'); return; }
  const pd  = DATA.performance_data;
  const pos = pd.positions.find(p => p.id === id);
  if (!pos) return;
  const prev = { exit_price: pos.exit_price, exit_date: pos.exit_date, confirmed: pos.confirmed };
  pos.exit_price = exitPrice; pos.exit_date = exitDate; pos.confirmed = true;
  pd.last_updated = new Date().toISOString().slice(0, 10);
  const ok = await ghWritePerf(pd);
  if (ok) renderStrategy(); else Object.assign(pos, prev);
}

async function perfDeletePos(id) {
  if (!confirm('確認刪除此持倉記錄？此操作無法復原。')) return;
  const pd  = DATA.performance_data;
  const idx = pd.positions.findIndex(p => p.id === id);
  if (idx === -1) return;
  const [removed] = pd.positions.splice(idx, 1);
  pd.last_updated = new Date().toISOString().slice(0, 10);
  const ok = await ghWritePerf(pd);
  if (ok) renderStrategy(); else pd.positions.splice(idx, 0, removed);
}

async function perfSyncData() {
  try {
    const res = await fetch(`data/performance.json?t=${Date.now()}`, { cache: 'no-store' });
    if (res.ok) { DATA.performance_data = await res.json(); renderStrategy(); }
    else alert('同步失敗，請確認 performance.json 已建立於 data/ 目錄');
  } catch(e) { alert('同步失敗：' + e.message); }
}

// ════════════════════════════════════════════════════
//  INIT — 從 JSON 載入資料後再渲染
// ════════════════════════════════════════════════════
async function loadData() {
  // 加入時間戳避免快取問題（瀏覽器 + CDN）
  const timestamp = new Date().getTime();

  try {
    const [chipsRes, vsRes, aiRes, perfRes] = await Promise.all([
      fetch(`data/chips_big_holder.json?t=${timestamp}`, { cache: 'no-store' }).then(r => r.ok ? r.json() : null).catch(() => null),
      fetch(`data/volume_signal.json?t=${timestamp}`,    { cache: 'no-store' }).then(r => r.ok ? r.json() : null).catch(() => null),
      fetch(`data/ai_recommendations.json?t=${timestamp}`, { cache: 'no-store' }).then(r => r.ok ? r.json() : null).catch(() => null),
      fetch(`data/performance.json?t=${timestamp}`,     { cache: 'no-store' }).then(r => r.ok ? r.json() : null).catch(() => null),
    ]);

    if (chipsRes && chipsRes.results) {
      DATA.chips_big_holder_data = chipsRes.results;
      const strat = STRATEGIES.find(s => s.id === 'chips_big_holder');
      if (strat) strat.dataUpdated = (chipsRes.updated || '').slice(0, 10) || strat.dataUpdated;
    }

    if (vsRes && vsRes.results) {
      DATA.volume_signal_data = vsRes.results;
      const strat = STRATEGIES.find(s => s.id === 'volume_signal');
      if (strat) strat.dataUpdated = (vsRes.updated || '').slice(0, 10) || strat.dataUpdated;
    }

    if (aiRes && aiRes.ranked) {
      aiData = aiRes;
    }

    if (perfRes) {
      DATA.performance_data = perfRes;
    }
  } catch (e) {
    console.error('資料載入失敗:', e);
  }

  // 資料載入完成後渲染
  renderNav();
  renderStrategy();
  document.getElementById('headerMeta').textContent =
    `策略數 ${STRATEGIES.filter(s=>s.available).length} / 觀察 ${watchlist.length}`;
}

loadData();
