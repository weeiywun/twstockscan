<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SR_PC</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
/* ── Variables (Light Theme) ─────────────────── */
:root {
  --bg:        #f2f4f7;
  --bg2:       #ffffff;
  --bg3:       #f7f8fa;
  --border:    rgba(0,0,0,0.08);
  --border2:   rgba(0,0,0,0.14);
  --text:      #1a1d2e;
  --text2:     #515869;
  --text3:     #96a0b0;
  --green:     #0c6b3e;
  --green-dim: rgba(12,107,62,0.08);
  --green-glow:rgba(12,107,62,0.15);
  --amber:     #a86200;
  --red:       #c0392b;
  --blue:      #1a5fa8;
  --mono:      'IBM Plex Mono', monospace;
  --sans:      'Noto Sans TC', sans-serif;
  --shadow-sm: 0 1px 4px rgba(0,0,0,0.06);
  --shadow:    0 2px 10px rgba(0,0,0,0.08);
  --radius:    10px;
}

/* ── Reset ─────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  background:var(--bg);color:var(--text);
  font-family:var(--sans);font-size:14px;line-height:1.6;
  min-height:100vh;overflow-x:hidden;
}

/* ── Shared inner constraint (aligns with .page-layout) ── */
.page-inner{
  max-width:1200px;margin:0 auto;padding:0 24px;width:100%;
}

/* ── Header ─────────────────────────────────── */
header{
  position:sticky;top:0;z-index:100;
  background:#fff;
  border-bottom:1px solid var(--border);
  box-shadow:var(--shadow-sm);
  height:54px;
}
header .page-inner{
  display:flex;align-items:center;gap:20px;height:100%;
}
.logo{
  font-size:16px;font-weight:700;
  color:var(--text);letter-spacing:-.01em;white-space:nowrap;
  display:flex;align-items:center;gap:8px;
  font-family:var(--sans);
}
.logo-mark{
  display:inline-block;width:8px;height:8px;
  background:var(--green);border-radius:2px;
  flex-shrink:0;
}
.logo span{color:var(--green)}
.version-badge{
  font-size:10px;font-weight:600;font-family:var(--mono);
  color:var(--green);background:var(--green-dim);
  border:1px solid var(--green-glow);
  border-radius:4px;padding:2px 6px;letter-spacing:.02em;
  margin-left:4px;
}

.header-meta{
  margin-left:auto;font-size:12px;color:var(--text3);
  white-space:nowrap;
}

/* ── Strategy Nav ───────────────────────────── */
.strategy-nav{
  background:#fff;border-bottom:1px solid var(--border);
}
.strategy-nav .page-inner{
  display:flex;gap:0;
  overflow-x:auto;scrollbar-width:none;
}
.strategy-nav .page-inner::-webkit-scrollbar{display:none}

.strat-tab{
  position:relative;
  padding:12px 18px 13px;
  font-size:13px;font-weight:500;
  color:var(--text2);
  border:none;background:none;cursor:pointer;
  transition:color .15s;white-space:nowrap;
  font-family:var(--sans);
  border-bottom:2px solid transparent;
  margin-bottom:-1px;
}
.strat-tab:hover{color:var(--text)}
.strat-tab.active{color:var(--green);border-bottom-color:var(--green)}
.strat-tab .badge{
  display:inline-flex;align-items:center;justify-content:center;
  min-width:18px;height:18px;padding:0 4px;border-radius:4px;
  background:var(--green-dim);color:var(--green);
  font-size:10px;font-weight:600;margin-left:6px;
}
.strat-tab.locked .badge{background:rgba(0,0,0,0.05);color:var(--text3)}
.strat-tab.locked{opacity:.5;cursor:not-allowed}

/* ── Tag badges ──────────────────────────────── */
.tag-badge{
  display:inline-block;padding:1px 6px;border-radius:10px;
  font-size:10px;font-weight:600;color:#fff;margin:1px 2px 1px 0;
  white-space:nowrap;
}

/* ── View mode toggle ────────────────────────── */
.view-btn{
  padding:4px 12px;border-radius:6px;font-size:12px;cursor:pointer;
  border:1px solid var(--border);background:#fff;color:var(--text2);
  font-family:var(--sans);transition:all .15s;
}
.view-btn.active{background:var(--green);border-color:var(--green);color:#fff;}
.view-btn:hover:not(.active){background:var(--bg2);}

/* ── Industry group header row ───────────────── */
tr.industry-header-row td{
  background:var(--bg2);padding:8px 12px;border-top:2px solid var(--border2);
}
.industry-name{font-weight:700;font-size:13px;color:var(--text);margin-right:10px;}
.industry-avg{font-size:12px;color:var(--green);font-weight:600;margin-right:8px;}
.industry-count{font-size:11px;color:var(--text3);}

/* ── Amber text ──────────────────────────────── */
.amber-text{color:var(--amber);font-weight:600;}

/* ── Main layout ─────────────────────────────── */
main{padding:24px 0 0;}

/* ── Strategy Panel ─────────────────────────── */
.strategy-panel{display:none;animation:fadeIn .2s ease}
.strategy-panel.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

/* ── Strategy header ─────────────────────────── */
.strat-header{margin-bottom:20px}
.strat-title{font-size:18px;font-weight:700;letter-spacing:-.02em;margin-bottom:5px}
.strat-desc{font-size:13px;color:var(--text2);max-width:640px;line-height:1.7}

/* ── Conditions bar ─────────────────────────── */
.conditions{display:flex;flex-wrap:wrap;gap:6px;margin:14px 0 24px}
.cond{
  display:flex;align-items:center;gap:5px;
  padding:4px 10px;border-radius:20px;
  background:#fff;border:1px solid var(--border);
  font-size:12px;color:var(--text2);
  box-shadow:var(--shadow-sm);
}
.cond-dot{width:5px;height:5px;border-radius:50%;background:var(--green);flex-shrink:0}

/* ── Summary row ─────────────────────────────── */
.summary-row{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;
  margin-bottom:24px;
}
.summary-card{
  background:#fff;border:1px solid var(--border);
  border-radius:var(--radius);padding:14px 16px;
  box-shadow:var(--shadow-sm);
}
.summary-label{font-size:11px;color:var(--text3);letter-spacing:.04em;margin-bottom:4px}
.summary-value{font-family:var(--mono);font-size:20px;font-weight:600;color:var(--text)}
.summary-value.green{color:var(--green)}
.summary-value.amber{color:var(--amber)}
.summary-sub{font-size:11px;color:var(--text3);margin-top:2px}

/* ── Results table ──────────────────────────── */
.table-wrap{
  background:#fff;border:1px solid var(--border);
  border-radius:var(--radius);overflow:hidden;margin-bottom:24px;
  box-shadow:var(--shadow-sm);
}
.table-toolbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;border-bottom:1px solid var(--border);
}
.table-title{font-size:12px;font-weight:600;color:var(--text2);letter-spacing:.04em}
.updated-tag{font-size:11px;color:var(--text3)}
.toolbar-right{display:flex;align-items:center;gap:10px}
.btn-csv{
  font-size:11px;font-weight:500;color:var(--text2);
  background:var(--bg3);border:1px solid var(--border);
  border-radius:6px;padding:4px 10px;cursor:pointer;
  display:flex;align-items:center;gap:5px;
  transition:background .15s,border-color .15s;
}
.btn-csv:hover{background:#e8f0fe;border-color:#aac4f7;color:#1a5fa8}

.table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;min-width:560px}
thead th{
  padding:9px 14px;text-align:left;
  font-size:11px;font-weight:600;color:var(--text3);
  letter-spacing:.04em;
  border-bottom:1px solid var(--border);background:var(--bg3);
  cursor:pointer;user-select:none;white-space:nowrap;
  position:sticky;top:0;z-index:2;
}
thead th:hover{color:var(--text2)}
thead th .sort-icon{opacity:.3;margin-left:4px;font-size:10px}
thead th.sorted .sort-icon{opacity:1;color:var(--green)}

tbody tr{
  border-bottom:1px solid var(--border);
  transition:background .12s;cursor:pointer;
}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:#f8fafc}
tbody tr.expanded{background:var(--green-dim)}

td{padding:12px 14px;vertical-align:middle}

.stock-code{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--green)}
.stock-name{font-size:13px;font-weight:500;margin-bottom:1px;color:var(--text)}
.stock-industry{font-size:11px;color:var(--text3)}

.price-cell{font-family:var(--mono);font-size:14px;font-weight:500;color:var(--text)}
.ema-cell{font-family:var(--mono);font-size:12px;color:var(--text3)}

.deviation{
  display:inline-flex;align-items:center;gap:3px;
  font-family:var(--mono);font-size:11px;font-weight:600;
  padding:2px 7px;border-radius:4px;
}
.deviation.neg{color:var(--blue);background:rgba(26,95,168,0.08)}
.deviation.pos{color:var(--amber);background:rgba(168,98,0,0.08)}

.big-pct{font-family:var(--mono);font-size:14px;font-weight:600;color:var(--text)}
.big-chg{
  font-family:var(--mono);font-size:11px;color:var(--green);
  background:var(--green-dim);padding:2px 5px;border-radius:3px;margin-left:5px;
}

/* ── Mini sparkline ─────────────────────────── */
.spark{display:inline-flex;align-items:flex-end;gap:2px;height:22px;vertical-align:middle}
.spark-bar{width:6px;background:var(--green);border-radius:1px 1px 0 0;opacity:.5;transition:opacity .15s}
tbody tr:hover .spark-bar{opacity:.9}

/* ── Expand row ─────────────────────────────── */
.expand-row td{padding:0}
.expand-content{
  padding:18px 18px 18px 48px;
  background:#fafbfc;
  border-top:1px solid var(--border);
  display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;
}
.expand-section h4{
  font-size:11px;font-weight:600;color:var(--text3);
  letter-spacing:.04em;margin-bottom:10px;
}
.trend-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.trend-date{font-family:var(--mono);font-size:11px;color:var(--text3);width:40px}
.trend-bar-wrap{flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.trend-bar{height:100%;background:var(--green);border-radius:3px;transition:width .5s ease}
.trend-bar.retail{background:var(--red)}
.trend-val{font-family:var(--mono);font-size:11px;color:var(--text2);width:44px;text-align:right}

/* ── Page layout (content + sidebar) ────────── */
.page-layout{
  max-width:1200px;margin:0 auto;padding:0 24px 64px;
  display:grid;grid-template-columns:1fr 220px;gap:20px;
  align-items:start;
}
.watchlist-sidebar{
  position:sticky;top:112px;
  background:#fff;border:1px solid var(--border);
  border-radius:var(--radius);overflow:hidden;
  box-shadow:var(--shadow-sm);
}
.sidebar-header{
  padding:10px 14px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  background:var(--bg3);
}
.section-title{font-size:11px;font-weight:600;color:var(--text2);letter-spacing:.04em}
.watch-list{display:flex;flex-direction:column}
.watch-card{
  padding:9px 12px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:8px;
  font-size:12px;transition:background .12s;
}
.watch-card:last-child{border-bottom:none}
.watch-card:hover{background:var(--bg3)}
.watch-card-code{font-family:var(--mono);color:var(--green);font-weight:700;flex:0 0 auto}
.watch-card-name{color:var(--text2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.watch-card-remove{color:var(--text3);cursor:pointer;flex:0 0 auto;line-height:1;font-size:15px}
.watch-card-remove:hover{color:var(--red)}
.watch-empty{padding:20px 14px;color:var(--text3);font-size:12px;text-align:center;line-height:1.7}


/* ── Coming Soon panel ───────────────────────── */
.coming-soon{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:72px 20px;text-align:center;gap:10px;
}
.coming-icon{font-size:36px;opacity:.25}
.coming-title{font-size:15px;font-weight:600;color:var(--text2)}
.coming-desc{font-size:13px;color:var(--text3);max-width:360px;line-height:1.8}

/* ── Tooltip ─────────────────────────────────── */
[data-tip]{position:relative}
[data-tip]::after{
  content:attr(data-tip);
  position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);
  background:var(--text);border:1px solid var(--border2);
  color:#fff;font-size:11px;padding:4px 8px;border-radius:4px;
  white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .15s;
  font-family:var(--sans);font-weight:400;z-index:50;
}
[data-tip]:hover::after{opacity:1}

/* ── 垂直捲軸（超過6筆啟用）───────────────────── */
.table-vscroll{
  max-height:312px;
  overflow-y:auto;
  scrollbar-width:thin;
  scrollbar-color:var(--border2) transparent;
}
.table-vscroll::-webkit-scrollbar{width:4px}
.table-vscroll::-webkit-scrollbar-track{background:transparent}
.table-vscroll::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* ── AI 推薦卡片 ─────────────────────────────── */
.ai-card{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--radius);overflow:hidden;margin-bottom:24px;
  box-shadow:var(--shadow-sm);
}
.ai-card-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;border-bottom:1px solid var(--border);
  background:linear-gradient(90deg,var(--green-dim) 0%,transparent 60%);
}
.ai-card-title{
  font-size:12px;font-weight:600;color:var(--green);
  letter-spacing:.06em;
}
.ai-card-meta{font-size:11px;color:var(--text3)}
.ai-card-body{padding:4px 0}
.ai-rank-item{
  display:flex;align-items:flex-start;gap:14px;
  padding:12px 16px;border-bottom:1px solid var(--border);
  transition:background .12s;
}
.ai-rank-item:last-child{border-bottom:none}
.ai-rank-item:hover{background:var(--bg3)}
.ai-rank-badge{
  flex:0 0 30px;height:30px;border-radius:6px;
  border:1.5px solid;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);font-size:11px;font-weight:700;
  margin-top:2px;flex-shrink:0;
}
.ai-rank-info{flex:1;min-width:0}
.ai-rank-stock{display:flex;align-items:center;gap:6px;margin-bottom:4px;flex-wrap:wrap}
.ai-rank-reason{font-size:12px;color:var(--text2);line-height:1.6}
.ai-score{
  flex:0 0 auto;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:0;
}
.ai-score-val{font-family:var(--mono);font-size:18px;font-weight:700}
.ai-score-label{font-size:10px;color:var(--text3)}
.ai-card-footer{
  padding:8px 16px;border-top:1px solid var(--border);
  font-size:11px;color:var(--text3);background:var(--bg3);
}
.ai-card-empty{
  padding:28px 16px;text-align:center;font-size:13px;color:var(--text3);
}

/* ════════════════════════════════════════════════
   RESPONSIVE  (RWD)
════════════════════════════════════════════════ */

/* ── ≤1024px: tighten sidebar ─────────────────── */
@media(max-width:1024px){
  .page-layout{grid-template-columns:1fr 200px}
}

/* ── ≤768px: single column ───────────────────── */
@media(max-width:768px){
  .page-inner{padding:0 16px}

  header{height:50px}
  .logo{font-size:15px}
  .header-meta{display:none}

.page-layout{
    grid-template-columns:1fr;
    padding:0 16px 48px;gap:16px;
  }
  main{padding:16px 0 0}

  .watchlist-sidebar{
    position:static;
    order:2;
  }

  .summary-row{grid-template-columns:1fr 1fr}

  .expand-content{
    grid-template-columns:1fr;
    gap:14px;
    padding:16px;
  }

  .table-wrap{border-radius:8px}
  .table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}

  /* 隱藏次要欄位：僅隱藏趨勢圖欄（第6欄），保留乖離率（第3欄） */
  thead th:nth-child(6),
  tbody td:nth-child(6){display:none}
}

/* ── ≤480px: compact ─────────────────────────── */
@media(max-width:480px){
  .summary-row{grid-template-columns:1fr 1fr}
  .summary-value{font-size:17px}

  .strat-tab{padding:10px 12px 11px;font-size:12px}

thead th:nth-child(4),
  tbody td:nth-child(4){display:none}
}
</style>
</head>
<body>

<header>
  <div class="page-inner">
    <div class="logo">
      <span class="logo-mark"></span>
      SR_PC
      <span class="version-badge">v0.3.0</span>
    </div>
    <div class="header-meta" id="headerMeta">載入中...</div>
  </div>
</header>

<!-- Strategy Tabs -->
<nav class="strategy-nav">
  <div class="page-inner" id="strategyNav"></div>
</nav>

<!-- Two-column layout -->
<div class="page-layout">
  <main id="mainContent"></main>
  <aside class="watchlist-sidebar">
    <div class="sidebar-header">
      <span class="section-title">觀察清單</span>
    </div>
    <div class="watch-list" id="watchlistGrid"></div>
  </aside>
</div>

<script>
// ════════════════════════════════════════════════════
//  STRATEGY REGISTRY
//  新增選股策略只需在這裡加一筆 + 提供 data
// ════════════════════════════════════════════════════
const STRATEGIES = [
  {
    id: "chips_big_holder",
    name: "籌碼集中",
    shortName: "籌碼集中",
    icon: "◈",
    available: true,
    description: "週末籌碼海選：追蹤千張大戶與 400 張大戶持股相對成長率（R），標記持續成長、雙軌觸發、單周增幅三類標籤，篩選低基期且量能充足的標的。",
    conditions: [
      "5日均量 > 500 張",
      "千張大戶比例 > 30%",
      "股價乖離 EMA120：±10% 以內",
      "🏷 持續成長 +1：連續兩週 R > 0%",
      "🏷 雙軌觸發 +3：R_400 ≥ 2.0% 或 R_1000 ≥ 1.25%",
      "🏷 單周增幅 +5：任一門檻單週 R > 3.0%",
    ],
    dataUpdated: "載入中...",
    dataSource: "集保開放資料 + FinMind",
    dataKey: "chips_big_holder_data",
  },
  {
    id: "volume_signal",
    name: "量增訊號",
    shortName: "量增訊號",
    icon: "◆",
    available: true,
    description: "每日盤後針對籌碼集中入池標的掃描量能突破訊號，捕捉主力啟動時機。",
    conditions: [
      "來源：籌碼集中入池標的",
      "當日成交量 ≥ 10日均量 × 1.5",
      "收盤價 > EMA5",
    ],
    dataUpdated: "載入中...",
    dataSource: "FinMind（每日盤後）",
    dataKey: "volume_signal_data",
  },
];


// ════════════════════════════════════════════════════
//  DATA
// ════════════════════════════════════════════════════
const DATA = {
  chips_big_holder_data: [],
  volume_signal_data:    [],
};
let DATE_LABELS = [];

// ════════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════════
let activeStratId = STRATEGIES[0].id;
let sortCol = "cumulative_3w";
let sortAsc = false;
let chipsViewMode = "stock"; // "stock" | "industry"
let expandedRow = null;
let watchlist = JSON.parse(localStorage.getItem("watchlist") || "[]");
let aiData = null;

// ════════════════════════════════════════════════════
//  TRADINGVIEW APP DEEP LINK
//  手機上優先呼出 TradingView App（需已安裝），
//  未安裝時 fallback 到網頁版；桌機直接開新分頁。
// ════════════════════════════════════════════════════
function openTV(tvSymbol, event) {
  event.stopPropagation();
  event.preventDefault();
  const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
  const webUrl = `https://www.tradingview.com/chart/?symbol=${tvSymbol}`;
  if (isMobile) {
    const appUrl = `tradingview://chart?symbol=${encodeURIComponent(tvSymbol)}`;
    // 嘗試喚起 App；若 App 未安裝，500ms 後 fallback 到網頁版
    const t0 = Date.now();
    window.location.href = appUrl;
    setTimeout(() => {
      if (Date.now() - t0 < 1200) window.open(webUrl, '_blank');
    }, 500);
  } else {
    window.open(webUrl, '_blank');
  }
}

// ════════════════════════════════════════════════════
//  EXCHANGE DETECTION
//  資料若有 market 欄位（"TWSE"/"TPEX"）優先採用，
//  否則依代號範圍推算（非 100% 精確）
// ════════════════════════════════════════════════════
function guessMarket(stockId) {
  const n = parseInt(stockId, 10);
  if (n >= 1000 && n <= 2999) return 'TWSE';   // 上市
  if (n >= 3000 && n <= 3499) return 'TWSE';   // 上市居多
  if (n >= 3500 && n <= 3999) return 'TPEX';   // 上櫃居多
  if (n >= 4000 && n <= 4999) return 'TPEX';   // 上櫃
  if (n >= 5000 && n <= 5999) return 'TPEX';   // 上櫃居多
  if (n >= 6000 && n <= 6999) return 'TPEX';   // 上櫃居多
  if (n >= 7000 && n <= 9999) return 'TPEX';   // 上櫃
  return 'TWSE';                                 // fallback
}

function getTVSymbol(d) {
  const market = d.market || guessMarket(d.stock_id);
  return `${market}:${d.stock_id}`;
}

// ════════════════════════════════════════════════════
//  RENDER HELPERS
// ════════════════════════════════════════════════════
function sparkBars(trend) {
  const min = Math.min(...trend), max = Math.max(...trend);
  const range = max - min || 1;
  return trend.map(v => {
    const h = Math.round(((v - min) / range) * 18) + 6;
    return `<span class="spark-bar" style="height:${h}px"></span>`;
  }).join('');
}

function trendBars(trend, label, colorClass) {
  const max = Math.max(...trend);
  return trend.map((v, i) => `
    <div class="trend-row">
      <span class="trend-date">${DATE_LABELS[i]}</span>
      <div class="trend-bar-wrap">
        <div class="trend-bar ${colorClass}" style="width:${(v/max*100).toFixed(1)}%"></div>
      </div>
      <span class="trend-val">${v.toFixed(2)}%</span>
    </div>`).join('');
}

// ════════════════════════════════════════════════════
function setStrategy(id) {
  activeStratId = id;
  expandedRow = null;
  renderNav();
  renderStrategy();
}

function sort(col) {
  if (sortCol === col) sortAsc = !sortAsc;
  else { sortCol = col; sortAsc = false; }
  renderStrategy();
}

function toggleExpand(sid) {
  const prev = expandedRow;
  if (prev) {
    document.getElementById(`expand-${prev}`).style.display = 'none';
    document.getElementById(`row-${prev}`).classList.remove('expanded');
  }
  if (prev !== sid) {
    document.getElementById(`expand-${sid}`).style.display = 'table-row';
    document.getElementById(`row-${sid}`).classList.add('expanded');
    expandedRow = sid;
  } else {
    expandedRow = null;
  }
}


function toggleWatch(sid, name) {
  if (watchlist.includes(sid)) {
    watchlist = watchlist.filter(s => s !== sid);
  } else {
    watchlist.push(sid);
  }
  localStorage.setItem("watchlist", JSON.stringify(watchlist));
  const btn = document.getElementById(`watchBtn-${sid}`);
  if (btn) {
    const inWatch = watchlist.includes(sid);
    btn.textContent = inWatch ? '✓ 已加入觀察清單' : '+ 加入觀察清單';
    btn.style.background = inWatch ? 'var(--green-dim)' : 'var(--bg3)';
    btn.style.borderColor = inWatch ? 'var(--green)' : 'var(--border)';
    btn.style.color = inWatch ? 'var(--green)' : 'var(--text2)';
  }
  const grid = document.getElementById('watchlistGrid');
  if (grid) grid.innerHTML = renderWatchlist();
}

function removeWatch(sid) {
  watchlist = watchlist.filter(s => s !== sid);
  localStorage.setItem("watchlist", JSON.stringify(watchlist));
  const grid = document.getElementById('watchlistGrid');
  if (grid) grid.innerHTML = renderWatchlist();
}

function exportCSV() {
  const strat = STRATEGIES.find(s => s.id === activeStratId);
  const data = DATA[strat.dataKey] || [];
  if (!data.length) return;

  const dateRow = DATE_LABELS.length ? DATE_LABELS.join(' / ') : strat.dataUpdated;
  const headers = [
    '代號', '名稱', '產業',
    '現價', '乖離EMA120(%)',
    '大戶比例(%)', '4週增幅(%)',
    `大戶趨勢(${dateRow})`,
    `散戶趨勢(${dateRow})`,
    '資料日期'
  ];

  const rows = data.map(d => [
    d.stock_id,
    d.name,
    d.industry || '',
    d.close.toFixed(1),
    (d.deviation >= 0 ? '+' : '') + d.deviation.toFixed(2),
    d.big_pct_latest.toFixed(2),
    (d.big_4w_chg >= 0 ? '+' : '') + d.big_4w_chg.toFixed(2),
    d.big_trend   ? d.big_trend.map(v => v.toFixed(2)).join(' / ')   : '',
    d.retail_trend? d.retail_trend.map(v => v.toFixed(2)).join(' / '): '',
    strat.dataUpdated
  ]);

  const csv = [headers, ...rows]
    .map(r => r.map(v => `"${String(v).replace(/"/g, '""')}"`).join(','))
    .join('\r\n');

  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `${strat.id}_${strat.dataUpdated}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

function setChipsView(mode) {
  chipsViewMode = mode;
  const strat = STRATEGIES.find(s => s.id === 'chips_big_holder');
  renderChipsHolder(strat, document.getElementById('mainContent'));
}

function chipsSort(col) {
  if (sortCol === col) sortAsc = !sortAsc;
  else { sortCol = col; sortAsc = false; }
  const strat = STRATEGIES.find(s => s.id === 'chips_big_holder');
  renderChipsHolder(strat, document.getElementById('mainContent'));
}

function exportCSVChips() {
  const data = DATA.chips_big_holder_data || [];
  if (!data.length) return;
  const strat = STRATEGIES.find(s => s.id === 'chips_big_holder');
  const headers = ['代號','名稱','族群','現價','周漲跌(%)','乖離EMA120(%)','大戶比例(%)','三周累積增幅(%)','標籤','分數'];
  const rows = data.map(d => [
    d.stock_id, d.name, d.industry || '',
    d.close?.toFixed(1) || '',
    d.week_chg_pct != null ? d.week_chg_pct.toFixed(2) : '',
    d.deviation != null ? d.deviation.toFixed(2) : '',
    d.big_pct_1000?.toFixed(2) || '',
    d.cumulative_3w != null ? d.cumulative_3w.toFixed(2) : '',
    (d.tags || []).join(' '),
    d.tag_score || 0,
  ]);
  const csv = [headers, ...rows].map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\r\n');
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' });
  const a = Object.assign(document.createElement('a'), { href: URL.createObjectURL(blob), download: `chips_${strat.dataUpdated}.csv` });
  a.click();
}

          <div class="coming-title">資料尚未生成</div>
          <div class="coming-desc">
            請至 GitHub Actions → <b>PHASE3 均線糾結選股</b> → <b>Run workflow</b><br>
            手動觸發首次掃描，或等待盤後 15:40 自動執行。
          </div>
        </div>
      </div>`;
    return;
  }

  // 排序（預設：糾結程度升序，越小越好）
  const etSortCol = window._etSortCol || 'tangle_pct';
  const etSortAsc = (window._etSortAsc !== undefined) ? window._etSortAsc : true;
  const data = rawData.slice().sort((a, b) => {
    const va = a[etSortCol] ?? 0, vb = b[etSortCol] ?? 0;
    if (typeof va === 'string') return etSortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
    return etSortAsc ? va - vb : vb - va;
  });

  const avgTangle = data.length ? data.reduce((s, d) => s + d.tangle_pct, 0) / data.length : 0;

  function sortIcon(col) {
    const active = etSortCol === col;
    return `<span class="sort-icon">${active ? (etSortAsc ? '↑' : '↓') : '·'}</span>`;
  }

  function etSort(col) {
    if (window._etSortCol === col) window._etSortAsc = !window._etSortAsc;
    else { window._etSortCol = col; window._etSortAsc = (col === 'tangle_pct'); }
    renderStrategy();
  }
  window.etSort = etSort;

  function exportEtCSV() {
    const headers = ['代號','名稱','市場','今日收盤','EMA20','EMA60','EMA120','糾結%','20日均量(張)'];
    const rows = data.map(d => [
      d.stock_id, d.name, d.market,
      d.close.toFixed(2),
      d.ema20.toFixed(2), d.ema60.toFixed(2), d.ema120.toFixed(2),
      d.tangle_pct.toFixed(2),
      d.vol_20ma.toFixed(0)
    ]);
    const csv = [headers, ...rows]
      .map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\r\n');
    const blob = new Blob(['\uFEFF' + csv], {type:'text/csv;charset=utf-8'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `ema_tangling_${strat.dataUpdated}.csv`;
    a.click(); URL.revokeObjectURL(url);
  }
  window.exportEtCSV = exportEtCSV;

  main.innerHTML = `
    <div class="strategy-panel active">
      <div class="strat-header">
        <div class="strat-title">${strat.icon} ${strat.name}策略</div>
        <div class="strat-desc">${strat.description}</div>
      </div>
      <div class="conditions">
        ${strat.conditions.map(c => `<div class="cond"><span class="cond-dot"></span>${c}</div>`).join('')}
      </div>

      <!-- Summary -->
      <div class="summary-row">
        <div class="summary-card">
          <div class="summary-label">篩選結果</div>
          <div class="summary-value green">${data.length}</div>
          <div class="summary-sub">符合全部條件</div>
        </div>
        <div class="summary-card">
          <div class="summary-label">平均糾結度</div>
          <div class="summary-value amber">${avgTangle.toFixed(2)}%</div>
          <div class="summary-sub">三線乖離均值（越小越緊）</div>
        </div>
        <div class="summary-card">
          <div class="summary-label">資料日期</div>
          <div class="summary-value" style="font-size:16px;font-family:var(--mono)">${strat.dataUpdated}</div>
          <div class="summary-sub">${strat.dataSource}</div>
        </div>
        <div class="summary-card">
          <div class="summary-label">掃描範圍</div>
          <div class="summary-value" style="font-size:16px">全市場</div>
          <div class="summary-sub">上市 + 上櫃</div>
        </div>
      </div>

      <!-- Table -->
      <div class="table-wrap">
        <div class="table-toolbar">
          <span class="table-title">均線糾結結果</span>
          <div class="toolbar-right">
            <span class="updated-tag">更新：${strat.dataUpdated}</span>
            <button class="btn-csv" onclick="exportEtCSV()">↓ 匯出 CSV</button>
          </div>
        </div>
        <div class="table-scroll">
          <table>
            <thead>
              <tr>
                <th onclick="etSort('stock_id')" style="cursor:pointer">代號 / 名稱${sortIcon('stock_id')}</th>
                <th onclick="etSort('close')" style="cursor:pointer" data-tip="今日收盤價">今日收${sortIcon('close')}</th>
                <th onclick="etSort('tangle_pct')" style="cursor:pointer" data-tip="(EMA最大值 − EMA最小值) / EMA最小值 × 100%">糾結%${sortIcon('tangle_pct')}</th>
                <th onclick="etSort('ema20')" style="cursor:pointer" data-tip="EMA20 值">EMA20${sortIcon('ema20')}</th>
                <th onclick="etSort('ema60')" style="cursor:pointer" data-tip="EMA60 值">EMA60${sortIcon('ema60')}</th>
                <th onclick="etSort('ema120')" style="cursor:pointer" data-tip="EMA120 值">EMA120${sortIcon('ema120')}</th>
                <th onclick="etSort('vol_20ma')" style="cursor:pointer" data-tip="20 日平均成交量（張）">均量(張)${sortIcon('vol_20ma')}</th>
              </tr>
            </thead>
            <tbody>
              ${data.map(d => {
                const mkt = d.market === 'TWSE' ? 'TWSE' : 'TPEX';
                const tvSymbol = `${mkt}:${d.stock_id}`;
                const inWatch = watchlist.includes(d.stock_id);
                const tangleColor = d.tangle_pct <= 2 ? 'var(--green)' : d.tangle_pct <= 4 ? 'var(--amber)' : 'var(--text2)';
                return `<tr onclick="etToggleExpand('${d.stock_id}')" id="et-row-${d.stock_id}">
                  <td>
                    <a href="https://www.tradingview.com/chart/?symbol=${tvSymbol}"
                       onclick="openTV('${tvSymbol}', event)" style="text-decoration:none;display:inline-block">
                      <div class="stock-code" style="display:flex;align-items:center;gap:5px">
                        ${d.stock_id}<span style="font-size:9px;opacity:.45;font-family:var(--mono)">↗</span>
                      </div>
                      <div class="stock-name">${d.name}</div>
                    </a>
                    <div class="stock-industry" style="font-size:10px;color:var(--text3)">${d.market}</div>
                  </td>
                  <td><span class="price-cell">${d.close.toFixed(2)}</span></td>
                  <td>
                    <span style="font-family:var(--mono);font-size:14px;font-weight:600;color:${tangleColor}">${d.tangle_pct.toFixed(2)}%</span>
                  </td>
                  <td><span class="ema-cell">${d.ema20.toFixed(2)}</span></td>
                  <td><span class="ema-cell">${d.ema60.toFixed(2)}</span></td>
                  <td><span class="ema-cell">${d.ema120.toFixed(2)}</span></td>
                  <td><span style="font-family:var(--mono);font-size:12px">${d.vol_20ma.toFixed(0)}</span></td>
                </tr>
                <tr class="expand-row" id="et-expand-${d.stock_id}" style="display:none">
                  <td colspan="7">
                    <div class="expand-content" style="grid-template-columns:1fr 1fr 1fr">
                      <div class="expand-section">
                        <h4>均線數值</h4>
                        <div style="display:flex;flex-direction:column;gap:6px;font-family:var(--mono);font-size:12px">
                          <div style="display:flex;justify-content:space-between"><span style="color:var(--text3)">EMA20</span><span>${d.ema20.toFixed(2)}</span></div>
                          <div style="display:flex;justify-content:space-between"><span style="color:var(--text3)">EMA60</span><span>${d.ema60.toFixed(2)}</span></div>
                          <div style="display:flex;justify-content:space-between"><span style="color:var(--text3)">EMA120</span><span>${d.ema120.toFixed(2)}</span></div>
                          <div style="display:flex;justify-content:space-between"><span style="color:var(--text3)">收盤</span><span style="color:var(--green);font-weight:600">${d.close.toFixed(2)}</span></div>
                        </div>
                      </div>
                      <div class="expand-section">
                        <h4>糾結分析</h4>
                        <div style="display:flex;flex-direction:column;gap:6px;font-family:var(--mono);font-size:12px">
                          <div style="display:flex;justify-content:space-between"><span style="color:var(--text3)">糾結度</span><span style="color:${tangleColor};font-weight:600">${d.tangle_pct.toFixed(2)}%</span></div>
                          <div style="display:flex;justify-content:space-between"><span style="color:var(--text3)">20日均量</span><span>${d.vol_20ma.toFixed(0)} 張</span></div>
                          <div style="display:flex;justify-content:space-between"><span style="color:var(--text3)">市場</span><span>${d.market}</span></div>
                        </div>
                      </div>
                      <div class="expand-section">
                        <h4>操作</h4>
                        <button onclick="event.stopPropagation();toggleWatch('${d.stock_id}','${d.name}')"
                          style="background:${inWatch?'var(--green-dim)':'#fff'};border:1px solid ${inWatch?'var(--green)':'var(--border)'};color:${inWatch?'var(--green)':'var(--text2)'};padding:8px 14px;border-radius:6px;cursor:pointer;font-size:12px;font-family:var(--sans);width:100%;margin-bottom:8px"
                          id="watchBtn-${d.stock_id}">
                          ${inWatch ? '✓ 已加入觀察清單' : '+ 加入觀察清單'}
                        </button>
                        <a href="https://tw.stock.yahoo.com/quote/${d.stock_id}" target="_blank"
                          onclick="event.stopPropagation()"
                          style="display:block;text-align:center;background:#fff;border:1px solid var(--border);color:var(--text2);padding:8px 14px;border-radius:6px;font-size:12px;text-decoration:none">
                          Yahoo 股市 ↗
                        </a>
                      </div>
                    </div>
                  </td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>
        </div>
      </div>
    </div>`;

  const grid = document.getElementById('watchlistGrid');
  if (grid) grid.innerHTML = renderWatchlist();
}

let etExpandedRow = null;

function etToggleExpand(sid) {
  const prev = etExpandedRow;
  if (prev) {
    const prevExp = document.getElementById(`et-expand-${prev}`);
    const prevRow = document.getElementById(`et-row-${prev}`);
    if (prevExp) prevExp.style.display = 'none';
    if (prevRow) prevRow.classList.remove('expanded');
  }
  if (prev !== sid) {
    const expEl = document.getElementById(`et-expand-${sid}`);
    const rowEl = document.getElementById(`et-row-${sid}`);
    if (expEl) expEl.style.display = 'table-row';
    if (rowEl) rowEl.classList.add('expanded');
    etExpandedRow = sid;
  } else {
    etExpandedRow = null;
  }
}

// ════════════════════════════════════════════════════
//  INIT — 從 JSON 載入資料後再渲染
// ════════════════════════════════════════════════════
async function loadData() {
  // 加入時間戳避免快取問題（瀏覽器 + CDN）
  const timestamp = new Date().getTime();

  try {
    const [chipsRes, vsRes, aiRes] = await Promise.all([
      fetch(`data/chips_big_holder.json?t=${timestamp}`, { cache: 'no-store' }).then(r => r.ok ? r.json() : null).catch(() => null),
      fetch(`data/volume_signal.json?t=${timestamp}`,    { cache: 'no-store' }).then(r => r.ok ? r.json() : null).catch(() => null),
      fetch(`data/ai_recommendations.json?t=${timestamp}`, { cache: 'no-store' }).then(r => r.ok ? r.json() : null).catch(() => null),
    ]);

    if (chipsRes && chipsRes.results) {
      DATA.chips_big_holder_data = chipsRes.results;
      const strat = STRATEGIES.find(s => s.id === 'chips_big_holder');
      if (strat) strat.dataUpdated = (chipsRes.updated || '').slice(0, 10) || strat.dataUpdated;
    }

    if (vsRes && vsRes.results) {
      DATA.volume_signal_data = vsRes.results;
      const strat = STRATEGIES.find(s => s.id === 'volume_signal');
      if (strat) strat.dataUpdated = (vsRes.updated || '').slice(0, 10) || strat.dataUpdated;
    }

    if (aiRes && aiRes.ranked) {
      aiData = aiRes;
    }
  } catch (e) {
    console.error('資料載入失敗:', e);
  }

  // 資料載入完成後渲染
  renderNav();
  renderStrategy();
  document.getElementById('headerMeta').textContent =
    `策略數 ${STRATEGIES.filter(s=>s.available).length} / 觀察 ${watchlist.length}`;
}

loadData();
</script>
</body>
</html>
