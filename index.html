<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SR_PC</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link rel="stylesheet" href="css/main.css?v=0.4.2">
</head>
<body>

<header>
  <div class="page-inner">
    <div class="logo">
      <span class="logo-mark"></span>
      SR_PC
      <span class="version-badge">v0.4.2</span>
    </div>
    <div id="hdrStratBtns" style="display:flex;align-items:center;gap:4px;margin-left:14px">
      <button id="hdrBtnFuture" onclick="setStrategy('future_dashboard')"
        style="font-size:11px;font-weight:600;font-family:var(--sans);padding:4px 10px;border-radius:5px;cursor:pointer;background:none;border:1px solid transparent;color:var(--text2);transition:all .15s;white-space:nowrap">
        ▣ FUTURE
      </button>
      <button id="hdrBtnPerf" onclick="setStrategy('performance')"
        style="display:none;font-size:11px;font-weight:600;font-family:var(--sans);padding:4px 10px;border-radius:5px;cursor:pointer;background:none;border:1px solid transparent;color:var(--text2);transition:all .15s;white-space:nowrap">
        ◐ 績效
      </button>
    </div>
    <div class="header-meta">
      <button id="headerUpdateBtn" class="header-update-btn" onclick="triggerPriceUpdate(this)" title="觸發 GitHub Actions 重新抓取標的現價與大盤指數（需 GitHub Token）">↑ 更新市場資料</button>
    </div>
  </div>
</header>

<!-- Strategy Tabs -->
<nav class="strategy-nav">
  <div class="page-inner" id="strategyNav"></div>
</nav>

<!-- Two-column layout -->
<div class="page-layout">
  <main id="mainContent"></main>
  <aside class="watchlist-sidebar" id="rightSidebar" style="display:none">
    <div id="marketPanel" class="market-panel" style="display:none"></div>
    <!-- 交易周記（績效頁顯示） -->
    <div id="journalPanel" style="display:none">
      <div class="sidebar-header journal-panel-header">
        <span class="section-title">交易周記</span>
        <button class="perf-btn perf-btn-add sidebar-mini-btn" onclick="journalShowAdd()">＋ 新增</button>
      </div>
      <div id="journalAddForm" class="journal-add-form" style="display:none">
        <div class="journal-form-field">
          <div class="perf-input-label">日期 *</div>
          <input id="jf-date" type="date" class="perf-input perf-input-full">
        </div>
        <div class="journal-form-field">
          <div class="perf-input-label">標題 *</div>
          <input id="jf-title" class="perf-input perf-input-full" placeholder="本週市場回顧…">
        </div>
        <div class="journal-form-field">
          <div class="perf-input-label">標籤（逗號分隔）</div>
          <input id="jf-tags" class="perf-input perf-input-full" placeholder="心得, 觀察">
        </div>
        <div class="journal-form-field">
          <div class="perf-input-label">內文</div>
          <textarea id="jf-content" class="perf-input perf-input-full journal-textarea" rows="6"
            placeholder="本週操作回顧、心得、下週計畫…"></textarea>
        </div>
        <div class="journal-form-actions">
          <button class="perf-btn perf-btn-confirm sidebar-mini-btn" onclick="journalSaveAdd()">儲存</button>
          <button class="perf-btn sidebar-mini-btn" onclick="journalShowAdd(false)">取消</button>
        </div>
      </div>
      <div id="journalList" class="journal-list"></div>
    </div>
  </aside>
</div>

<script src="js/app.js?v=0.4.2"></script>
<script src="js/render-ssr.js?v=0.4.2"></script>
<script src="js/render-futures.js?v=0.4.2"></script>
<script src="js/render-chips.js?v=0.4.2"></script>
<script src="js/render-volume.js?v=0.4.2"></script>
<script src="js/render-analysis.js?v=0.4.2"></script>
<script src="js/render-breakout.js?v=0.4.2"></script>
<script src="js/render-vcp.js?v=0.4.2"></script>
<script src="js/render-trust.js?v=0.4.2"></script>
<script src="js/render-ema.js?v=0.4.2"></script>
<script src="js/render-perf.js?v=0.4.2"></script>
<script src="js/render-right-top.js?v=0.4.2"></script>
<script src="js/render-right-top-track.js?v=0.4.2"></script>
</body>
</html>
